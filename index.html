<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>컴플라이언스 리스크 관리 시스템 v2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg-base:#0d1520;--bg-surface:#131e2d;--bg-card:#192233;--bg-card-hover:#1e2a3e;
  --bg-input:#0f1929;--bg-login:#1a2535;
  --border:#1e2f46;--border-light:#253a56;--border-focus:#f59e0b;
  --text-primary:#edf2fa;--text-secondary:#8da8c8;--text-muted:#465e7a;--text-placeholder:#5a7696;
  --accent:#f59e0b;--accent-dim:rgba(245,158,11,.12);--accent-hover:#fbbf24;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,.13);
  --orange:#f97316;--orange-dim:rgba(249,115,22,.13);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.13);
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,.13);
  --r-sm:6px;--r:10px;--r-lg:16px;
  --shadow:0 4px 28px rgba(0,0,0,.55);--shadow-sm:0 2px 10px rgba(0,0,0,.4);
  --font:'IBM Plex Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;
  --sidebar:230px;--header:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg-base);color:var(--text-primary);font-size:15px;line-height:1.65}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* ─── LOGIN ─── */
#login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:var(--bg-base);
  background-image:radial-gradient(ellipse at 20% 60%,rgba(59,130,246,.07) 0%,transparent 55%),
                   radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%);
}
.login-box{
  background:var(--bg-login);border:1px solid var(--border-light);border-radius:var(--r-lg);
  padding:42px 38px;width:430px;max-width:95vw;
  box-shadow:var(--shadow),0 0 80px rgba(245,158,11,.05);
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-icon{font-size:42px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 14px rgba(245,158,11,.45))}
.login-logo h1{font-size:24px;font-weight:700;color:var(--text-primary);line-height:1.35;letter-spacing:-.02em}
.login-logo p{font-size:14px;color:var(--text-secondary);margin-top:6px}
.login-divider{height:1px;background:var(--border);margin:24px 0}
.login-lbl{display:block;font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:8px}
.login-input{
  width:100%;background:var(--bg-input);border:1px solid var(--border-light);
  color:var(--text-primary);padding:13px 15px;border-radius:var(--r-sm);
  font-family:var(--font);font-size:15px;transition:border-color .15s,box-shadow .15s;margin-bottom:18px;
}
.login-input::placeholder{color:var(--text-placeholder)}
.login-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.login-input option{background:var(--bg-surface)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.role-card{
  border:2px solid var(--border-light);border-radius:var(--r);padding:18px 12px;
  cursor:pointer;transition:all .18s;text-align:center;background:var(--bg-card);
}
.role-card:hover{border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-2px)}
.role-card.selected{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.role-card .rc-icon{font-size:26px;display:block;margin-bottom:8px}
.role-card .rc-label{font-size:14px;font-weight:700;color:var(--text-primary);line-height:1.35}
.role-card .rc-desc{font-size:11px;color:var(--text-secondary);margin-top:4px;line-height:1.4}
.role-card.selected .rc-label{color:var(--accent)}
.login-btn{
  width:100%;padding:14px;background:var(--accent);color:#0d1520;
  border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:all .15s;letter-spacing:.01em;margin-top:2px;
}
.login-btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 18px rgba(245,158,11,.35)}

/* ─── APP LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  height:var(--header);padding:0 24px;background:var(--bg-surface);
  border-bottom:1px solid var(--border);flex-shrink:0;gap:14px;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--text-primary);white-space:nowrap}
.pulse-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;animation:pulse 2.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(1.2)}}
.header-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header-ctrl label{color:var(--text-muted);font-size:12px;white-space:nowrap}
.h-select{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:5px 9px;border-radius:var(--r-sm);font-size:12px;font-family:var(--font)}
.h-select:focus{outline:none;border-color:var(--accent)}
.main-wrap{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar);background:var(--bg-surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;padding:10px 0;overflow-y:auto;
}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;padding:14px 18px 6px}
.sb-section{padding:0 8px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);
  cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:500;
  transition:all .15s;border:none;background:transparent;width:100%;text-align:left;
  border-left:3px solid transparent;margin:1px 0;
}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:var(--mono);min-width:18px;text-align:center}
.sb-info{font-size:11px;color:var(--text-muted);padding:8px 20px 12px;line-height:1.7}
.sb-chip{display:inline-block;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;margin-bottom:4px}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:28px;background:var(--bg-base)}

/* ─── SECTION HEADER ─── */
.sec-hd{margin-bottom:22px}
.sec-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:4px;letter-spacing:-.02em}
.sec-sub{font-size:13px;color:var(--text-secondary)}

/* ─── KPI ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:26px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden;transition:border-color .15s,transform .15s;cursor:default}
.kpi-card:hover{border-color:var(--border-light);transform:translateY(-2px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.c-blue::before{background:var(--blue)}.kpi-card.c-green::before{background:var(--green)}
.kpi-card.c-red::before{background:var(--red)}.kpi-card.c-amber::before{background:var(--accent)}
.kpi-card.c-purple::before{background:var(--purple)}.kpi-card.c-teal::before{background:var(--teal)}
.kpi-label{font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.kpi-value{font-size:30px;font-weight:700;color:var(--text-primary);font-family:var(--mono);line-height:1}
.kpi-sub{font-size:11px;color:var(--text-secondary);margin-top:8px}

/* ─── CARD ─── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-draft{background:rgba(70,94,122,.25);color:#8da8c8}
.b-submitted{background:var(--blue-dim);color:var(--blue)}
.b-evaluated{background:var(--green-dim);color:var(--green)}
.b-revision{background:var(--orange-dim);color:var(--orange)}
.b-resubmitted{background:var(--purple-dim);color:var(--purple)}
.b-blocked{background:var(--red-dim);color:var(--red)}
.b-inprogress{background:var(--teal-dim);color:var(--teal)}
.b-completed{background:var(--green-dim);color:var(--green)}
.b-notstarted{background:rgba(70,94,122,.25);color:#8da8c8}
.b-selected{background:var(--accent-dim);color:var(--accent)}
.b-warn{background:var(--red-dim);color:var(--red)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--font);white-space:nowrap}
.btn-primary{background:var(--accent);color:#0d1520}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,158,11,.3)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.btn-success{background:var(--green);color:#0d1520}.btn-success:hover{filter:brightness(1.1)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}.btn-danger:hover{background:var(--red-dim)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{filter:brightness(1.1)}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{filter:brightness(1.1)}
.btn-teal{background:var(--teal);color:#0d1520}.btn-teal:hover{filter:brightness(1.1)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important}

/* ─── FORM ─── */
.fg{margin-bottom:16px}
.flabel{display:block;font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.flabel .req{color:var(--red);margin-left:2px}
.fc{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);padding:10px 13px;border-radius:var(--r-sm);font-family:var(--font);font-size:14px;transition:border-color .15s,box-shadow .15s}
.fc::placeholder{color:var(--text-placeholder)}
.fc:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
textarea.fc{resize:vertical;min-height:90px}
select.fc option{background:var(--bg-surface)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ─── FILTER BAR ─── */
.fbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:18px}
.fbar label{font-size:12px;color:var(--text-muted);white-space:nowrap}
.fbar select,.fbar input[type=text]{background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:var(--r-sm);font-size:12px;font-family:var(--font)}
.fbar select:focus,.fbar input:focus{outline:none;border-color:var(--accent)}
.fbar-sep{height:20px;width:1px;background:var(--border)}
.fbar-count{margin-left:auto;font-size:12px;color:var(--text-muted);font-family:var(--mono);white-space:nowrap}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg-surface);color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:11px 13px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:11px 13px;border-bottom:1px solid var(--border);color:var(--text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-card-hover)}

/* ─── RISK CARD ─── */
.risk-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:13px;overflow:hidden;transition:border-color .15s}
.risk-card:hover{border-color:var(--border-light)}
.risk-card.rc-evaluated{border-left:3px solid var(--green)}
.risk-card.rc-submitted{border-left:3px solid var(--blue)}
.risk-card.rc-revision{border-left:3px solid var(--orange)}
.risk-card.rc-blocked{border-left:3px solid var(--red)}
.rch{display:flex;align-items:flex-start;justify-content:space-between;padding:17px 20px;cursor:pointer;gap:14px;user-select:none}
.rch:hover{background:var(--bg-card-hover)}
.rch-info{flex:1;min-width:0}
.risk-id-tag{font-size:10px;font-family:var(--mono);color:var(--text-muted);margin-bottom:4px;letter-spacing:.05em}
.risk-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.risk-desc{font-size:12px;color:var(--text-secondary);line-height:1.5}
.risk-task{font-size:12px;color:var(--accent);margin-top:6px;padding:4px 10px;background:var(--accent-dim);border-radius:var(--r-sm);display:inline-block}
.risk-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.score-pill{font-family:var(--mono);font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 9px;border-radius:20px;font-weight:600}
.rcb{border-top:1px solid var(--border);padding:20px;display:none;animation:slideDown .2s ease}
.rcb.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.rch-toggle{color:var(--text-muted);font-size:17px;transition:transform .2s;flex-shrink:0;margin-top:2px}
.risk-card.expanded .rch-toggle{transform:rotate(180deg)}

/* ─── ACCORDION ─── */
.acc-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.acc-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.acc-hd:hover{background:var(--bg-card-hover)}
.acc-title{font-size:14px;font-weight:600;color:var(--text-primary)}
.acc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.acc-arrow{color:var(--text-muted);font-size:13px;transition:transform .2s}
.acc-item.open .acc-arrow{transform:rotate(180deg)}
.acc-body{border-top:1px solid var(--border);padding:18px;display:none}
.acc-item.open .acc-body{display:block}

/* ─── EVAL CARD ─── */
.eval-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:13px}
.eval-risk-title{font-weight:600;font-size:14px;margin-bottom:4px}
.eval-risk-sub{font-size:12px;color:var(--text-secondary);margin-bottom:13px;line-height:1.5}
.progress-box{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--text-secondary);margin-bottom:13px;white-space:pre-wrap;line-height:1.6;max-height:120px;overflow-y:auto}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-row input[type=range]{flex:1;accent-color:var(--accent)}
.score-disp{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);width:48px;text-align:right;flex-shrink:0}

/* ─── MISC ─── */
.chip{display:inline-block;font-size:11px;background:rgba(70,94,122,.3);color:var(--text-secondary);padding:2px 8px;border-radius:10px}
.warn-box{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.warn-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.warn-title{font-size:13px;font-weight:600;color:var(--red)}
.warn-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.warn-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.warn-tag{display:inline-block;background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3);font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--r-sm)}
.pbar-wrap{background:var(--bg-input);border-radius:100px;height:10px;overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:100px;transition:width .7s ease}
.upload-area{border:2px dashed var(--border-light);border-radius:var(--r);padding:22px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg-input)}
.upload-area:hover{border-color:var(--accent);background:var(--accent-dim)}
.upload-area.drag-over{border-color:var(--accent);background:var(--accent-dim)}
.upload-area .up-icon{font-size:26px}
.upload-area p{font-size:13px;color:var(--text-secondary);margin-top:6px}
.upload-file-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:6px;font-size:12px}
.upload-file-item .fn{color:var(--text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-file-item .fs{color:var(--text-muted);font-family:var(--mono);font-size:11px;margin:0 10px;flex-shrink:0}
.upload-file-item .fr{color:var(--red);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
.obj-box{background:var(--orange-dim);border:1px solid rgba(249,115,22,.3);border-radius:var(--r);padding:13px 16px;margin-top:12px;font-size:13px}
.obj-title{font-weight:600;color:var(--orange);margin-bottom:4px;font-size:12px}
.hist-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-yr{font-family:var(--mono);font-size:11px;color:var(--text-muted);width:42px;flex-shrink:0}
.hist-sc{font-family:var(--mono);font-size:15px;font-weight:700;width:44px;flex-shrink:0}
.hist-delta{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px}
.hist-up{color:var(--green);background:var(--green-dim)}.hist-dn{color:var(--red);background:var(--red-dim)}.hist-eq{color:var(--text-muted);background:rgba(70,94,122,.2)}
.team-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:var(--r-sm)}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:var(--bg-card-hover);padding:11px 12px;margin:0 -12px}
.t-name{font-size:13px;font-weight:600;width:76px;flex-shrink:0}
.t-pct{font-family:var(--mono);font-size:13px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:16px 0}
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flex-btw{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.tx-mono{font-family:var(--mono)}.tx-muted{color:var(--text-muted)}.tx-sm{font-size:12px}.tx-xs{font-size:11px}

/* ─── TOAST ─── */
#toast-ct{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:toastIn .25s ease;min-width:250px;max-width:360px}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.t-ok{background:#18331f;border:1px solid rgba(34,197,94,.3);color:var(--green)}
.t-err{background:#321616;border:1px solid rgba(239,68,68,.3);color:var(--red)}
.t-inf{background:#152233;border:1px solid rgba(59,130,246,.3);color:var(--blue)}
.t-warn{background:#2e2010;border:1px solid rgba(245,158,11,.3);color:var(--accent)}

/* ─── MODAL ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:28px;width:540px;max-width:95vw;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow);animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ─── HEATMAP ─── */
.hm-wrap{overflow-x:auto}
.hm-grid{display:grid;grid-template-columns:34px repeat(5,1fr);gap:4px;min-width:380px}
.hm-cell{border-radius:var(--r-sm);padding:6px 4px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:transform .15s,box-shadow .15s;cursor:default}
.hm-cell:hover{transform:scale(1.06);z-index:2;box-shadow:var(--shadow-sm)}
.hm-cnt{font-family:var(--mono);font-size:16px;font-weight:700}
.hm-lbl{font-size:10px;margin-top:2px;text-align:center;line-height:1.3}
.hm-axis{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-weight:600}
.hm-axis-v{writing-mode:vertical-rl;transform:rotate(180deg)}
.hm-title-row{text-align:center;font-size:11px;color:var(--text-muted);font-weight:600;padding:4px 0}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){.sidebar{display:none}.grid-2,.grid-3{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px}}
</style>

async function fetchRiskMaster(year) {
  if (API_CONFIG.useMock) {

  }
  const res = await fetch(`${API_CONFIG.urls.fetchRiskMaster}?year=${year}`);
  return res.json();
}

async function saveRiskMaster(data) {
  if (API_CONFIG.useMock) {
    const idx = mockRiskMaster.findIndex(r => r.riskId === data.riskId);
    if (idx >= 0) mockRiskMaster[idx] = data; else mockRiskMaster.push(data);
    return {success:true};
  }
  const res = await fetch(API_CONFIG.urls.saveRiskMaster,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return res.json();
}

async function fetchMonthlyStatus(team, year, month) {
  if (API_CONFIG.useMock) {
    return mockMonthlyStatus.filter(s =>
      (!team  || s.team  === team)  &&
      (!year  || s.year  === Number(year))  &&
      (!month || s.month === Number(month))
    );
  }
  const p = new URLSearchParams({team:team||'',year:year||'',month:month||''});
  const res = await fetch(`${API_CONFIG.urls.fetchMonthlyStatus}?${p}`);
  return res.json();
}

async function saveMonthlyStatus(data) {
  if (API_CONFIG.useMock) {
    const idx = mockMonthlyStatus.findIndex(s => s.id === data.id);

    return {success:true};
  }
  const res = await fetch(API_CONFIG.urls.saveMonthlyStatus,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return res.json();
}

  if (API_CONFIG.useMock) {
    const idx = mockEvaluations.findIndex(e => e.id === data.id);
    if (idx >= 0) mockEvaluations[idx] = data; else mockEvaluations.push(data);
    // MonthlyStatus 상태 동기화
    const ms = mockMonthlyStatus.find(s =>
      s.riskId === data.riskId && s.team === data.team &&

}

function genId(prefix) {
  return `${prefix}-${Date.now()}-${Math.floor(Math.random()*1000)}`;
}

function calcRiskScore(r) {
  return (r.impactScore || 0) * (r.likelihoodScore || 0);
}

function getScoreColor(score) {
  if (score === null || score === undefined) return 'var(--text-muted)';
  if (score >= 80) return 'var(--green)';
  if (score >= 60) return 'var(--accent)';
  return 'var(--red)';
}

function getRiskScoreColor(score) {
  if (score >= 15) return 'var(--red)';
  if (score >= 9)  return 'var(--orange)';
  return 'var(--green)';
}

function getStatusBadgeClass(s) {
  const map = {
    Draft:'b-draft', Submitted:'b-submitted', Evaluated:'b-evaluated',
    RevisionReq:'b-revision', Resubmitted:'b-resubmitted', Blocked:'b-blocked',
    InProgress:'b-inprogress', Completed:'b-completed', NotStarted:'b-notstarted',
  };
  return `badge ${map[s] || 'b-draft'}`;
}

function getStatusLabel(s) {
  const map = {
    Draft:'임시저장', Submitted:'제출완료', Evaluated:'평가완료',
    RevisionReq:'수정요청', Resubmitted:'재제출', Blocked:'지연/중단',
    InProgress:'진행중', Completed:'완료', NotStarted:'미착수',
  };
  return map[s] || s || '미입력';
}

function showToast(msg, type='ok') {
  const ct = document.getElementById('toast-ct');
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  const icons = {ok:'✓',err:'✕',inf:'ℹ',warn:'⚠'};
  el.innerHTML = `<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  ct.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3000);
}

function openModal(html) {
  closeModal();

  ov.id = 'modal-overlay';
  ov.onclick = e => { if (e.target === ov) closeModal(); };
  ov.innerHTML = `<div class="modal-box">${html}</div>`;
  document.body.appendChild(ov);
}

function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

/* 대시보드 집계 빌더 (mock 전용) */
function buildDashboardData(year, month) {
  const y = Number(year), m = Number(month);
  const selectedRisks = mockRiskMaster.filter(r => r.year === y && r.isSelected);
  const allStatuses   = mockMonthlyStatus.filter(s => s.year === y && s.month === m);
  const allEvals      = mockEvaluations.filter(e => e.year === y && e.month === m);

  const totalRisks     = selectedRisks.length;
  const submitted      = allStatuses.filter(s => s.submissionStatus !== 'Draft').length;
  const evaluated      = allStatuses.filter(s => s.submissionStatus === 'Evaluated').length;
  const revisionReq    = allStatuses.filter(s => s.submissionStatus === 'RevisionReq').length;
  const pending        = totalRisks - submitted;

  // 미입력 팀 감지
  const submittedTeams = [...new Set(allStatuses.filter(s=>s.submissionStatus!=='Draft').map(s=>s.team))];
  const activeTeams    = [...new Set(selectedRisks.map(r=>r.team))];
  const missingTeams   = activeTeams.filter(t => !submittedTeams.includes(t));

  // 팀별 이행률
  const teamScores = TEAMS.map(team => {
    const tRisks = selectedRisks.filter(r => r.team === team);
    const tEvals = allEvals.filter(e => e.team === team);
    const avgScore = tEvals.length
      ? Math.round(tEvals.reduce((a,e)=>a+e.evaluationScore,0)/tEvals.length)
      : null;
    const subCount = allStatuses.filter(s=>s.team===team&&s.submissionStatus!=='Draft').length;
    const rate = tRisks.length ? Math.round(subCount/tRisks.length*100) : 0;
    return {team, score:avgScore, submitRate:rate, riskCount:tRisks.length, evalCount:tEvals.length};
  });

  return {totalRisks,submitted,evaluated,revisionReq,pending,missingTeams,teamScores,selectedRisks,allStatuses,allEvals};
}

/* 팀/연도 월별 평균 점수 */
function getTeamMonthlyScores(team, year) {
  return Array.from({length:12},(_,i)=>{
    const m = i+1;
    const evals = mockEvaluations.filter(e=>e.team===team&&e.year===year&&e.month===m);
    return evals.length ? Math.round(evals.reduce((a,e)=>a+e.evaluationScore,0)/evals.length) : null;
  });
}

/* 리스크 히스토리 (현재 연도 vs 전년도) */
function getRiskHistory(riskTitle, team, currentYear) {
  const prevYear = currentYear - 1;
  const prevEvals = mockEvaluations.filter(e => {
    const rm = mockRiskMaster.find(r => r.riskId===e.riskId);
    return rm && rm.riskTitle===riskTitle && e.team===team && e.year===prevYear;
  });
  const curEvals = mockEvaluations.filter(e => {
    const rm = mockRiskMaster.find(r => r.riskId===e.riskId);
    return rm && rm.riskTitle===riskTitle && e.team===team && e.year===currentYear;
  });
  const prev = prevEvals.length ? Math.round(prevEvals.reduce((a,e)=>a+e.evaluationScore,0)/prevEvals.length) : null;
  const cur  = curEvals.length  ? Math.round(curEvals.reduce((a,e)=>a+e.evaluationScore,0)/curEvals.length)  : null;
  return {prev, cur, delta: (prev!==null&&cur!==null) ? cur-prev : null};
}

    improvementTask: document.getElementById('mTask').value,
    impactScore:     impact,
    likelihoodScore: likelihood,
    riskFormulaScore: impact * likelihood,

async function submitEditRisk(riskId) {
  const r = mockRiskMaster.find(x => x.riskId === riskId);
  if (!r) return;
  const impact     = Number(document.getElementById('eImpact').value);
  const likelihood = Number(document.getElementById('eLikelihood').value);
  r.team            = document.getElementById('eTeam').value;
  r.riskCategory    = document.getElementById('eCat').value;
  r.riskTitle       = document.getElementById('eTitle').value.trim();
  r.riskDescription = document.getElementById('eDesc').value;
  r.improvementTask = document.getElementById('eTask').value;
  r.impactScore     = impact;
  r.likelihoodScore = likelihood;
  r.riskFormulaScore = impact * likelihood;
  await saveRiskMaster(r);
  closeModal();
  showToast('리스크가 수정되었습니다.', 'ok');
  renderView('risk-master');
}

/* Excel 업로드 */
function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, {type:'binary'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      let added = 0;
      rows.forEach(row => {
        const impact     = Number(row.ImpactScore     || row['영향도']          || 3);
        const likelihood = Number(row.LikelihoodScore || row['발생가능성']        || 3);
        const year       = Number(row.Year            || row['연도']             || AppState.year);
        const team       = row.Team                   || row['팀']               || '';
        const cat        = row.RiskCategory           || row['리스크유형']        || '';
        const title      = row.RiskTitle              || row['리스크제목']        || '';
        if (!title || !team) return;
        const maxNum = mockRiskMaster.filter(r=>r.year===year).length + added + 1;
        const riskId = `R-${year}-${String(maxNum).padStart(3,'0')}`;
        mockRiskMaster.push({
          riskId, year, team, riskCategory:cat, riskTitle:title,
          riskDescription: row.RiskDescription  || row['리스크설명']   || '',
          improvementTask: row.ImprovementTask  || row['개선과제']     || '',
          impactScore: impact, likelihoodScore: likelihood,
          riskFormulaScore: impact * likelihood, isSelected: false,
        });
        added++;
      });
      showToast(`Excel에서 ${added}건 업로드 완료. RiskFormulaScore 자동 계산됨.`, 'ok');
      renderView('risk-master');
    } catch(err) {
      showToast('Excel 파싱 오류. 양식을 확인해 주세요.', 'err');
      console.error(err);
    }
  };
  reader.readAsBinaryString(file);
  input.value = '';
}

function downloadExcelTemplate() {
  const ws = XLSX.utils.aoa_to_sheet([
    ['Year','Team','RiskCategory','RiskTitle','RiskDescription','ImprovementTask','ImpactScore','LikelihoodScore'],
    [2025,'영업팀','계약','계약서 미검토 리스크','예시 설명','예시 개선과제',5,4],
  ]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'RiskMaster');
  XLSX.writeFile(wb, 'RiskMaster_Template.xlsx');
}

function handleFileInput(input, riskId) {
  const files = Array.from(input.files);

function handleFilesDrop(files, riskId) {
  if (!window._pendingFiles) window._pendingFiles = {};
  if (!window._pendingFiles[riskId]) window._pendingFiles[riskId] = [];
  const list = document.getElementById(`filelist-${riskId}`);
  files.forEach(f => {
    window._pendingFiles[riskId].push(f);
    const idx = (list ? list.children.length : 0);
    const sizeStr = f.size < 1024*1024 ? `${Math.round(f.size/1024)}KB` : `${(f.size/1024/1024).toFixed(1)}MB`;
    if (list) list.insertAdjacentHTML('beforeend', `
      <div class="upload-file-item" id="pfitem-${riskId}-${idx}">
        <span class="fn">📎 ${f.name}</span>
        <span class="fs">${sizeStr}</span>
        <span class="fr" onclick="this.parentElement.remove()" title="삭제">×</span>
      </div>`);
  });
  showToast(`${files.length}개 파일이 추가되었습니다. (제출 시 SharePoint 업로드)`, 'inf');
}

function removeFile(riskId, idx) {
  const el = document.getElementById(`fitem-${riskId}-${idx}`);

}

async function saveDraft(riskId, existingId) {
  const prog   = document.getElementById(`prog-${riskId}`)?.value.trim() || '';
  const tstat  = document.getElementById(`tstat-${riskId}`)?.value || 'NotStarted';
  const evdesc = document.getElementById(`evdesc-${riskId}`)?.value.trim() || '';

  const id = existingId || genId('MS');
  const existing = mockMonthlyStatus.find(s=>s.id===id);
  const files = existing ? (existing.evidenceFiles||[]) : [];

  const data = {
    id, riskId,
    team:   AppState.role==='ComplianceAdmin' ? (AppState.viewAsTeam||AppState.userTeam) : AppState.userTeam,
    year:   AppState.year, month: AppState.month,
    thisMonthProgress: prog, taskStatus: tstat,
    evidenceDescription: evdesc, evidenceFiles: files,
    submissionStatus: 'Draft',
    submittedAt: null, submittedBy: null,
  };
  await saveMonthlyStatus(data);
  showToast('임시저장 완료.', 'inf');
  renderView('team-input');
}

async function submitStatus(riskId, existingId) {
  const prog   = document.getElementById(`prog-${riskId}`)?.value.trim() || '';
  if (!prog) { showToast('이행 내용을 입력해 주세요.', 'err'); return; }
  const tstat  = document.getElementById(`tstat-${riskId}`)?.value || 'NotStarted';
  const evdesc = document.getElementById(`evdesc-${riskId}`)?.value.trim() || '';

  const id = existingId || genId('MS');
  const existing = mockMonthlyStatus.find(s=>s.id===id);
  const files = existing ? (existing.evidenceFiles||[]) : [];

  // pending 파일 업로드 (SharePoint placeholder)
  if (window._pendingFiles && window._pendingFiles[riskId]) {
    for (const f of window._pendingFiles[riskId]) {
      const res = await uploadToSharePoint(f, `${AppState.year}/${AppState.month}/${riskId}`, riskId);
      if (res.success) files.push(res.fileName);
    }
    delete window._pendingFiles[riskId];
  }

  const data = {
    id, riskId,
    team:   AppState.role==='ComplianceAdmin' ? (AppState.viewAsTeam||AppState.userTeam) : AppState.userTeam,
    year:   AppState.year, month: AppState.month,
    thisMonthProgress: prog, taskStatus: tstat,
    evidenceDescription: evdesc, evidenceFiles: files,
    submissionStatus: 'Submitted',
    submittedAt: new Date().toISOString().slice(0,10),
    submittedBy: AppState.userName,
  };
  await saveMonthlyStatus(data);
  showToast('제출 완료. 컴플라이언스팀에 알림이 발송됩니다.', 'ok');
  updateEvalBadge();
  renderView('team-input');
}

function openRevisionModal(riskId, statusId) {
  openModal(`
    <div class="modal-title">⚑ 이의신청</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">
      평가 결과에 이의가 있는 경우 사유를 작성하여 제출하세요.
    </div>
    <div class="fg">
      <label class="flabel">이의신청 사유 <span class="req">*</span></label>
      <textarea class="fc" id="objReason" rows="4" placeholder="이의신청 사유를 구체적으로 입력해 주세요."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" onclick="submitObjection('${riskId}','${statusId}')">이의신청 제출</button>
    </div>
  `);
}

async function submitObjection(riskId, statusId) {
  const reason = document.getElementById('objReason')?.value.trim();
  if (!reason) { showToast('이의신청 사유를 입력해 주세요.', 'err'); return; }
  const team = AppState.role==='ComplianceAdmin' ? (AppState.viewAsTeam||AppState.userTeam) : AppState.userTeam;
  const data = {
    id: genId('OBJ'), statusId, riskId, team,
    year: AppState.year, month: AppState.month,
    objectionReason: reason,
    objectionStatus: 'Pending',
    submittedAt: new Date().toISOString().slice(0,10),
    submittedBy: AppState.userName,
  };
  await saveObjection(data);
  closeModal();
  showToast('이의신청이 제출되었습니다.', 'ok');
  renderView('team-input');
}

/* ── 내 팀 이행 현황 뷰 ── */
async function renderMyHistoryView(container) {
  const team  = AppState.role==='ComplianceAdmin' ? (AppState.viewAsTeam||TEAMS[0]) : AppState.userTeam;
  const year  = AppState.year;
  const scores = getTeamMonthlyScores(team, year);
  const selected = mockRiskMaster.filter(r=>r.year===year&&r.isSelected&&r.team===team);
  const evals = mockEvaluations.filter(e=>e.team===team&&e.year===year);
  const avgScore = evals.length ? Math.round(evals.reduce((a,e)=>a+e.evaluationScore,0)/evals.length) : null;

  container.innerHTML = `
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">📈 내 팀 이행 현황</div>
          <div class="sec-sub">${year}년 ${team} 월별 이행점수 추이</div>
        </div>
        ${AppState.role==='ComplianceAdmin' ? `
        <select class="fc" style="width:110px" onchange="AppState.viewAsTeam=this.value;renderView('my-history')">
          ${TEAMS.map(t=>`<option value="${t}" ${t===team?'selected':''}>${t}</option>`).join('')}
        </select>` : ''}
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card c-amber"><div class="kpi-label">점검대상 리스크</div><div class="kpi-value">${selected.length}</div></div>
      <div class="kpi-card c-blue"><div class="kpi-label">평가 완료</div><div class="kpi-value">${evals.length}</div></div>
      <div class="kpi-card c-green"><div class="kpi-label">연간 평균점수</div><div class="kpi-value">${avgScore!==null?avgScore+'점':'—'}</div></div>
    </div>
    <div class="card">
      <div class="card-title">월별 이행점수 추이 (${year}년)</div>
      <div style="height:240px"><canvas id="myTeamChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">리스크별 누적 현황</div>
      ${selected.map(risk => {
        const rEvals = evals.filter(e=>e.riskId===risk.riskId);
        const avg = rEvals.length ? Math.round(rEvals.reduce((a,e)=>a+e.evaluationScore,0)/rEvals.length) : null;
        const hist = getRiskHistory(risk.riskTitle, team, year);
        return `
        <div style="display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${risk.riskTitle}</div>
            <div class="tx-xs tx-muted mt-4">${risk.riskCategory} · ${risk.riskId}</div>
          </div>
          ${avg!==null?`<span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${getScoreColor(avg)}">${avg}점</span>`:'<span class="tx-sm tx-muted">미평가</span>'}
          ${hist.delta!==null?`<span class="hist-delta ${hist.delta>0?'hist-up':hist.delta<0?'hist-dn':'hist-eq'}">${hist.delta>0?'▲':hist.delta<0?'▼':'─'}${Math.abs(hist.delta)}</span>`:''}
        </div>`;
      }).join('')}
    </div>
  `;

  // 라인 차트
  setTimeout(()=>{
    const canvas = document.getElementById('myTeamChart');
    if (!canvas) return;
    new Chart(canvas, {
      type:'line',
      data:{
        labels:Array.from({length:12},(_,i)=>`${i+1}월`),
        datasets:[{
          label:'이행점수', data:scores,
          borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.1)',
          borderWidth:2.5, pointRadius:5,
          pointBackgroundColor: scores.map(s=>s!==null?getScoreColor(s):'transparent'),
          tension:.35, spanGaps:false,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.raw!==null?` ${c.raw}점`:' 미평가'}}},
        scales:{
          y:{min:0,max:100,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8da8c8',font:{size:11}}},
          x:{grid:{display:false},ticks:{color:'#8da8c8',font:{size:11}}}
        }
      }
    });
  }, 100);
}
</script>

<script>
/* ════════════════════════════════════════════════════════════
   BLOCK 8 — renderAdminEvaluationView (컴플라이언스 평가)
════════════════════════════════════════════════════════════ */

async function renderAdminEvaluationView(container) {
  const {year, month} = AppState;
  const fTeam   = AppState.eFilterTeam;
  const fStatus = AppState.eFilterStatus;

  // 제출된 월간 현황 조회
  let statuses = await fetchMonthlyStatus('', year, month);
  statuses = statuses.filter(s => s.submissionStatus !== 'Draft');

  if (fTeam)   statuses = statuses.filter(s=>s.team===fTeam);
  if (fStatus !== 'all') statuses = statuses.filter(s=>s.submissionStatus===fStatus);

  const pendingCount = mockMonthlyStatus.filter(s=>s.year===year&&s.month===month&&s.submissionStatus==='Submitted').length;

  container.innerHTML = `
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">⚖️ 이행점수 평가</div>
          <div class="sec-sub">${year}년 ${month}월 · 팀 제출 현황 검토 및 이행점수 평가</div>
        </div>
        <div class="flex-row">
          <span class="chip" style="background:var(--orange-dim);color:var(--orange)">평가대기 ${pendingCount}건</span>
        </div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="fbar">
      <label>팀</label>
      <select onchange="AppState.eFilterTeam=this.value;renderView('admin-eval')">
        <option value="">전체</option>
        ${TEAMS.map(t=>`<option value="${t}" ${t===fTeam?'selected':''}>${t}</option>`).join('')}
      </select>
      <label>상태</label>
      <select onchange="AppState.eFilterStatus=this.value;renderView('admin-eval')">
        <option value="all">전체 제출건</option>
        <option value="Submitted"   ${fStatus==='Submitted'  ?'selected':''}>제출완료</option>
        <option value="Evaluated"   ${fStatus==='Evaluated'  ?'selected':''}>평가완료</option>
        <option value="RevisionReq" ${fStatus==='RevisionReq'?'selected':''}>수정요청</option>
        <option value="Resubmitted" ${fStatus==='Resubmitted'?'selected':''}>재제출</option>
      </select>
      <span class="fbar-count">${statuses.length}건</span>
    </div>

    ${statuses.length === 0
      ? `<div class="card" style="text-align:center;padding:36px;color:var(--text-muted)">
           이번 달 제출된 현황이 없습니다.
         </div>`
      : statuses.map(st => renderEvalCard(st, year, month)).join('')
    }
  `;
}

function renderEvalCard(st, year, month) {
  const risk = mockRiskMaster.find(r=>r.riskId===st.riskId);
  const ev   = mockEvaluations.find(e=>e.riskId===st.riskId&&e.team===st.team&&e.year===year&&e.month===month);
  const obj  = mockObjections.find(o=>o.riskId===st.riskId&&o.team===st.team&&o.year===year&&o.month===month);

  const isAlreadyEvaluated = !!ev;
  const prevScore = ev ? ev.evaluationScore : 70;
  const prevCmt   = ev ? ev.evaluationComment : '';
  const prevStatus = ev ? ev.evaluationStatus : 'Evaluated';

  const evId = ev ? ev.id : genId('EV');

  return `
  <div class="eval-card" id="evcard-${st.id}">
    <div class="flex-btw mb-8">
      <div>
        <div class="eval-risk-title">
          ${risk ? risk.riskTitle : st.riskId}
          <span class="chip" style="margin-left:6px;font-size:11px">${risk?risk.riskCategory:''}</span>
        </div>
        <div class="eval-risk-sub">
          <span class="chip">${st.team}</span>
          <span style="margin-left:6px">${year}년 ${month}월 · 제출일: ${st.submittedAt||'—'} · 담당자: ${st.submittedBy||'—'}</span>
        </div>
      </div>
      <span class="${getStatusBadgeClass(st.submissionStatus)}">${getStatusLabel(st.submissionStatus)}</span>
    </div>

    <!-- 팀 제출 내용 -->
    <div class="tx-xs tx-muted mb-4" style="font-weight:600;text-transform:uppercase;letter-spacing:.06em">이행 내용</div>
    <div class="progress-box">${st.thisMonthProgress || '(미입력)'}</div>

    <!-- 이행 상태 -->
    <div class="flex-row mb-12">
      <span class="${getStatusBadgeClass(st.taskStatus)}">${getStatusLabel(st.taskStatus)}</span>
      ${st.evidenceFiles && st.evidenceFiles.length
        ? st.evidenceFiles.map(f=>`<span class="chip">📎 ${f}</span>`).join('')
        : '<span class="tx-xs tx-muted">증빙 없음</span>'}
    </div>

    <!-- 이의신청 표시 -->
    ${obj ? `
    <div class="obj-box mb-12">
      <div class="obj-title">⚑ 이의신청 접수 (${obj.submittedAt}) — ${obj.objectionStatus==='Pending'?'<span style="color:var(--orange)">검토중</span>':'처리완료'}</div>
      <div style="color:var(--text-primary);margin-top:4px">${obj.objectionReason}</div>
    </div>` : ''}

    <!-- 평가 입력 -->
    <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:4px">
      <div class="tx-xs tx-muted mb-12" style="font-weight:600;text-transform:uppercase;letter-spacing:.06em">평가 입력</div>
      <div class="score-row">
        <span class="tx-sm" style="color:var(--text-secondary);white-space:nowrap">이행점수</span>
        <input type="range" id="srange-${st.id}" min="0" max="100" value="${prevScore}"
          oninput="document.getElementById('sdisp-${st.id}').textContent=this.value"/>
        <div class="score-disp" id="sdisp-${st.id}">${prevScore}</div>
      </div>
      <div class="fg mt-8">
        <textarea class="fc" id="ecmt-${st.id}" rows="3"
          placeholder="평가 코멘트 (개선 권고사항, 보완 지시 등)">${prevCmt}</textarea>
      </div>
      <div class="fg">
        <label class="flabel">평가 결과</label>
        <div class="flex-row">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
            <input type="radio" name="estatus-${st.id}" value="Evaluated" ${prevStatus==='Evaluated'?'checked':''}> 평가완료
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
            <input type="radio" name="estatus-${st.id}" value="RevisionReq" ${prevStatus==='RevisionReq'?'checked':''}> 수정요청
          </label>
        </div>
      </div>
      <div class="flex-row mt-8">
        <button class="btn btn-primary" onclick="submitEvaluation('${st.id}','${st.riskId}','${st.team}','${evId}')">
          ✓ 평가 저장
        </button>
        ${obj ? `<button class="btn btn-secondary" onclick="resolveObjection('${obj.id}')">이의신청 처리완료</button>` : ''}
        ${isAlreadyEvaluated ? `<span class="tx-sm tx-muted">마지막 평가: ${ev.evaluatedAt}</span>` : ''}
      </div>
    </div>
  </div>`;
}

async function submitEvaluation(statusId, riskId, team, evId) {
  const score  = Number(document.getElementById(`srange-${statusId}`)?.value || 0);
  const cmt    = document.getElementById(`ecmt-${statusId}`)?.value.trim() || '';
  const radio  = document.querySelector(`input[name="estatus-${statusId}"]:checked`);
  const estatus = radio ? radio.value : 'Evaluated';

  const data = {
    id: evId, riskId, team,
    year: AppState.year, month: AppState.month,
    evaluationScore: score, evaluationComment: cmt,
    evaluationStatus: estatus,
    evaluatedAt: new Date().toISOString().slice(0,10),
    evaluatedBy: AppState.userName,
  };
  await saveEvaluation(data);
  showToast(`평가 저장 완료 (${score}점 · ${estatus==='Evaluated'?'평가완료':'수정요청'})`, 'ok');
  updateEvalBadge();
  renderView('admin-eval');
}

async function resolveObjection(objId) {
  const obj = mockObjections.find(o=>o.id===objId);
  if (!obj) return;
  obj.objectionStatus = 'Resolved';
  showToast('이의신청을 처리완료로 변경했습니다.', 'ok');
  renderView('admin-eval');
}

/* ════════════════════════════════════════════════════════════
   BLOCK 9 — renderDashboardView (관리자 대시보드)

        <div class="kpi-sub">평가 완료</div>
      </div>

        <div class="kpi-sub">수정 요청</div>
      </div>
    </div>

    <!-- 미입력 팀 경고 -->

      <div class="warn-icon">⚠️</div>
      <div>
        <div class="warn-title">${month}월 미제출 팀 감지 (${dash.missingTeams.length}개 팀)</div>
        <div class="warn-sub">아래 팀의 월간 현황이 제출되지 않았습니다. 독촉 알림 발송을 권장합니다.</div>

        </div>
      </div>
    </div>` : `
    <div style="background:var(--green-dim);border:1px solid rgba(34,197,94,.3);border-radius:var(--r);padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">✅</span>
      <span style="font-size:13px;font-weight:600;color:var(--green)">모든 팀이 ${month}월 현황을 제출했습니다.</span>
    </div>`}

    <!-- 그리드: 팀별 이행현황 + 히트맵 -->
    <div class="grid-2 mb-16">
      <!-- 팀별 이행현황 -->
      <div class="card" style="margin-bottom:0">
        <div class="card-title">📊 팀별 이행 현황</div>
        <div style="margin-bottom:18px">
          ${dash.teamScores.map(ts => renderTeamProgressRow(ts)).join('')}
        </div>
        <div style="height:200px"><canvas id="teamBarChart"></canvas></div>
      </div>

      <div class="card" style="margin-bottom:0">
        <div class="card-title">🔥 리스크 Heatmap (Impact × Likelihood)</div>
        ${renderHeatmap(year)}
      </div>

  // 차트 렌더링

function renderTeamProgressRow(ts) {
  const pct = ts.submitRate;
  const clr = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--red)';
  return `
  <div class="team-row" onclick="">
    <span class="t-name">${ts.team}</span>
    <div class="pbar-wrap">
      <div class="pbar-fill" style="width:${pct}%;background:${clr}"></div>
    </div>
    <span class="t-pct" style="color:${clr}">${pct}%</span>
    ${ts.score!==null
      ? `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${getScoreColor(ts.score)};width:44px;text-align:right;flex-shrink:0">${ts.score}점</span>`
      : `<span style="font-size:11px;color:var(--text-muted);width:44px;text-align:right;flex-shrink:0">미평가</span>`}
  </div>`;
}

function renderTeamAccordion(ts, dash, year, month) {
  const selectedRisks = mockRiskMaster.filter(r=>r.year===year&&r.isSelected&&r.team===ts.team);
  const statuses = dash.allStatuses.filter(s=>s.team===ts.team);
  const submitted = statuses.filter(s=>s.submissionStatus!=='Draft').length;

  return `
  <div class="acc-item" data-team="${ts.team}">
    <div class="acc-hd">
      <div class="acc-title">${ts.team}</div>
      <div class="acc-meta">
        <span class="chip">점검 ${selectedRisks.length}건</span>
        <span class="chip">제출 ${submitted}/${selectedRisks.length}</span>
        ${ts.score!==null
          ? `<span style="font-family:var(--mono);font-size:15px;font-weight:700;color:${getScoreColor(ts.score)}">${ts.score}점</span>`
          : `<span class="tx-sm tx-muted">미평가</span>`}
        <span class="acc-arrow">▼</span>
      </div>
    </div>
    <div class="acc-body">
      <div style="height:180px;margin-bottom:16px">
        <canvas id="mchart-${ts.team.replace(/\s/g,'')}"></canvas>
      </div>
      ${selectedRisks.map(risk => {
        const st = statuses.find(s=>s.riskId===risk.riskId);
        const ev = mockEvaluations.find(e=>e.riskId===risk.riskId&&e.year===year&&e.month===month&&e.team===ts.team);
        return `
        <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:8px">
          <div class="flex-row">
            <span class="tx-mono tx-xs tx-muted">${risk.riskId}</span>
            <span style="font-size:13px;font-weight:600">${risk.riskTitle}</span>
            <span class="${getStatusBadgeClass(st?st.submissionStatus:'Draft')}">${getStatusLabel(st?st.submissionStatus:'미입력')}</span>
            ${ev?`<span style="margin-left:auto;font-family:var(--mono);font-weight:700;font-size:14px;color:${getScoreColor(ev.evaluationScore)}">${ev.evaluationScore}점</span>`:''}
          </div>
          ${st&&st.thisMonthProgress?`<div class="tx-sm tx-muted mt-4">${st.thisMonthProgress.substring(0,80)}${st.thisMonthProgress.length>80?'…':''}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ─── Heatmap (Impact × Likelihood) ─── */
function renderHeatmap(year) {
  const risks = mockRiskMaster.filter(r=>r.year===year&&r.isSelected);

  // 5×5 grid: rows = Likelihood (5→1), cols = Impact (1→5)
  const cells = {};
  for (let l=1;l<=5;l++) for (let i=1;i<=5;i++) cells[`${l}_${i}`] = [];

  risks.forEach(r => {
    const key = `${r.likelihoodScore}_${r.impactScore}`;
    if (cells[key]) cells[key].push(r.riskTitle);
  });

  const getHmColor = (impact, likelihood) => {
    const score = impact * likelihood;
    if (score >= 15) return {bg:'rgba(239,68,68,.35)',  clr:'#fca5a5'};
    if (score >= 9)  return {bg:'rgba(249,115,22,.3)',  clr:'#fdba74'};
    if (score >= 5)  return {bg:'rgba(234,179,8,.25)',  clr:'#fde047'};
    return                  {bg:'rgba(34,197,94,.2)',   clr:'#86efac'};
  };

  let html = '<div class="hm-wrap"><div class="hm-grid">';

  // 상단 축 헤더 빈칸
  html += '<div class="hm-axis"></div>';
  for (let i=1;i<=5;i++) html += `<div class="hm-axis" style="font-size:12px">${i}</div>`;

  // 행: Likelihood 5→1
  for (let l=5;l>=1;l--) {
    html += `<div class="hm-axis">${l}</div>`;
    for (let i=1;i<=5;i++) {
      const key   = `${l}_${i}`;
      const count = cells[key].length;
      const {bg, clr} = getHmColor(i, l);
      const title = cells[key].length ? cells[key].join('\n') : '';
      html += `
      <div class="hm-cell" style="background:${bg}" title="${title}">
        <span class="hm-cnt" style="color:${count>0?clr:'rgba(255,255,255,.15)'}">${count>0?count:'·'}</span>
        ${count>0?`<span class="hm-lbl" style="color:${clr};opacity:.8">${count}건</span>`:''}
      </div>`;
    }
  }

  html += '</div>';

  // 축 레이블
  html += `
    <div style="display:flex;justify-content:space-between;margin-top:6px;padding:0 34px">
      <span class="tx-xs tx-muted">← 영향도 낮음</span>
      <span class="tx-xs" style="color:var(--text-secondary);font-weight:600">영향도 (Impact)</span>
      <span class="tx-xs tx-muted">높음 →</span>
    </div>
    <div style="text-align:center;margin-top:4px">
      <span class="tx-xs" style="color:var(--text-secondary);font-weight:600">발생가능성 (Likelihood) ↑</span>
    </div>
    <div class="flex-row mt-8" style="justify-content:center;gap:12px">
      <span style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:12px;height:12px;background:rgba(34,197,94,.4);border-radius:3px;display:inline-block"></span>저위험</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:12px;height:12px;background:rgba(234,179,8,.4);border-radius:3px;display:inline-block"></span>주의</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:12px;height:12px;background:rgba(249,115,22,.45);border-radius:3px;display:inline-block"></span>고위험</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:12px;height:12px;background:rgba(239,68,68,.5);border-radius:3px;display:inline-block"></span>최고위험</span>
    </div>
  </div>`;

  return html;
}

/* ─── 팀별 가로 막대 차트 ─── */
function renderTeamBarChart(teamScores) {
  const canvas = document.getElementById('teamBarChart');
  if (!canvas) return;
  if (window._barChart) { window._barChart.destroy(); delete window._barChart; }

  const labels = teamScores.map(t=>t.team);
  const data   = teamScores.map(t=>t.score||0);
  const colors = data.map(s=>getScoreColor(s));

  window._barChart = new Chart(canvas, {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'평균 이행점수', data,
        backgroundColor: colors.map(c=>c+'55'),
        borderColor: colors,
        borderWidth:2, borderRadius:5,
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw}점`}}},
      scales:{
        x:{min:0,max:100,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8da8c8',font:{size:11}}},
        y:{grid:{display:false},ticks:{color:'#edf2fa',font:{size:12}}}
      }
    }
  });
}

/* ─── 팀 월별 라인 차트 ─── */
function renderTeamMonthChart(team, year) {
  const safe   = team.replace(/\s/g,'');
  const canvas = document.getElementById(`mchart-${safe}`);
  if (!canvas) return;
  if (window[`_mc_${safe}`]) { window[`_mc_${safe}`].destroy(); delete window[`_mc_${safe}`]; }

  const scores = getTeamMonthlyScores(team, year);

  window[`_mc_${safe}`] = new Chart(canvas, {
    type:'line',
    data:{
      labels:Array.from({length:12},(_,i)=>`${i+1}월`),
      datasets:[{
        label:'이행점수', data:scores,
        borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.1)',
        borderWidth:2.5, pointRadius:5,
        pointBackgroundColor: scores.map(s=>s!==null?getScoreColor(s):'transparent'),
        tension:.35, spanGaps:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.raw!==null?` ${c.raw}점`:' 미평가'}}},
      scales:{
        y:{min:0,max:100,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8da8c8',font:{size:10}}},
        x:{grid:{display:false},ticks:{color:'#8da8c8',font:{size:10}}}
      }
    }
  });
}
