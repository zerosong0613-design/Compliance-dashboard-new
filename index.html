<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>컴플라이언스 리스크 관리 시스템 v2.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

:root {
  /* ── Light Theme Colors ── */
  --bg-base:        #f0f2f5;
  --bg-surface:     #ffffff;
  --bg-card:        #ffffff;
  --bg-card-hover:  #f8f9fb;
  --bg-input:       #ffffff;
  --bg-sidebar:     #1e2d40;
  --bg-sidebar-hover: #263648;
  --bg-sidebar-active: #2e4160;
  --bg-header:      #1e2d40;

  --border:         #e2e7ed;
  --border-light:   #edf0f4;
  --border-focus:   #2563eb;

  --text-primary:   #1a2332;
  --text-secondary: #4a5568;
  --text-muted:     #94a3b8;
  --text-placeholder: #b0bec5;
  --text-sidebar:   #c8d6e5;
  --text-sidebar-active: #ffffff;

  --accent:         #2563eb;
  --accent-dim:     rgba(37,99,235,.09);
  --accent-hover:   #1d4ed8;

  --blue:           #2563eb;
  --blue-dim:       rgba(37,99,235,.1);
  --blue-light:     #eff6ff;
  --green:          #16a34a;
  --green-dim:      rgba(22,163,74,.1);
  --green-light:    #f0fdf4;
  --red:            #dc2626;
  --red-dim:        rgba(220,38,38,.1);
  --red-light:      #fef2f2;
  --orange:         #ea580c;
  --orange-dim:     rgba(234,88,12,.1);
  --orange-light:   #fff7ed;
  --purple:         #7c3aed;
  --purple-dim:     rgba(124,58,237,.1);
  --purple-light:   #f5f3ff;
  --amber:          #d97706;
  --amber-dim:      rgba(217,119,6,.1);
  --amber-light:    #fffbeb;
  --teal:           #0891b2;
  --teal-dim:       rgba(8,145,178,.1);
  --teal-light:     #f0f9ff;

  --r-sm: 6px;
  --r:    10px;
  --r-lg: 14px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow:    0 4px 16px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.15);

  --font:  'Noto Sans KR', 'Pretendard', sans-serif;
  --mono:  'IBM Plex Mono', monospace;

  --sidebar: 230px;
  --header:  58px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* ═══════════════════ LOGIN ═══════════════════ */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1e2d40 0%, #2e4160 50%, #1a3a5c 100%);
}
.login-box {
  background: #fff;
  border-radius: var(--r-lg);
  padding: 44px 40px;
  width: 440px; max-width: 95vw;
  box-shadow: var(--shadow-lg);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .logo-icon { font-size: 40px; display: block; margin-bottom: 12px; }
.login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.35; }
.login-logo p  { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
.login-divider { height: 1px; background: var(--border); margin: 24px 0; }
.login-lbl { display: block; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.login-input {
  width: 100%; background: #fff; border: 1.5px solid var(--border);
  color: var(--text-primary); padding: 12px 14px; border-radius: var(--r-sm);
  font-family: var(--font); font-size: 15px; transition: border-color .15s, box-shadow .15s;
  margin-bottom: 16px;
}
.login-input::placeholder { color: var(--text-placeholder); }
.login-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.login-input option { background: #fff; color: var(--text-primary); }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.role-card {
  border: 2px solid var(--border); border-radius: var(--r);
  padding: 18px 12px; cursor: pointer; transition: all .18s;
  text-align: center; background: #fafbfc;
}
.role-card:hover { border-color: var(--accent); background: var(--blue-light); transform: translateY(-1px); }
.role-card.selected { border-color: var(--accent); background: var(--blue-light); box-shadow: 0 0 0 3px var(--accent-dim); }
.role-card .rc-icon  { font-size: 26px; display: block; margin-bottom: 8px; }
.role-card .rc-label { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
.role-card .rc-desc  { font-size: 11px; color: var(--text-secondary); margin-top: 4px; line-height: 1.4; }
.role-card.selected .rc-label { color: var(--accent); }
.login-btn {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm); font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--font); transition: all .15s; margin-top: 2px;
}
.login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }

/* ═══════════════════ APP LAYOUT ═══════════════════ */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  height: var(--header); padding: 0 24px;
  background: var(--bg-header); border-bottom: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0; gap: 14px; z-index: 100;
}
.header-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 16px; color: #fff; white-space: nowrap;
}
.header-brand .pulse-dot {
  width: 8px; height: 8px; background: #34d399;
  border-radius: 50%; animation: pulse 2.5s infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.25)} }
.header-ctrl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header-ctrl label { color: rgba(255,255,255,.6); font-size: 12px; white-space: nowrap; }
.h-select {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #fff; padding: 5px 9px; border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font);
}
.h-select:focus { outline: none; border-color: rgba(255,255,255,.5); }
.h-select option { background: #1e2d40; }
.header-user-chip {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 20px; white-space: nowrap;
}

.main-wrap { display: flex; flex: 1; overflow: hidden; }

/* ═══════════════════ SIDEBAR ═══════════════════ */
.sidebar {
  width: var(--sidebar); background: var(--bg-sidebar);
  display: flex; flex-direction: column; flex-shrink: 0; padding: 12px 0; overflow-y: auto;
}
.sb-label {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  color: rgba(200,214,229,.5); text-transform: uppercase; padding: 14px 18px 6px;
}
.sb-section { padding: 0 10px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: var(--r-sm); cursor: pointer; color: var(--text-sidebar);
  font-size: 13px; font-weight: 500; transition: all .15s;
  border: none; background: transparent; width: 100%; text-align: left;
  border-left: 3px solid transparent; margin: 1px 0;
}
.nav-item:hover { background: var(--bg-sidebar-hover); color: #fff; }
.nav-item.active { background: var(--bg-sidebar-active); color: #fff; border-left-color: #60a5fa; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: #ef4444; color: #fff;
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 10px; font-family: var(--mono); min-width: 18px; text-align: center;
}
.sb-info { font-size: 12px; color: rgba(200,214,229,.6); padding: 8px 18px 12px; line-height: 1.7; }
.sb-team-chip {
  display: inline-block; background: rgba(96,165,250,.2); color: #93c5fd;
  border: 1px solid rgba(96,165,250,.3); font-size: 11px; font-weight: 600;
  padding: 2px 9px; border-radius: 10px; margin-bottom: 4px;
}

/* ═══════════════════ CONTENT ═══════════════════ */
.content { flex: 1; overflow-y: auto; padding: 28px; background: var(--bg-base); }

/* ═══════════════════ SECTION HEADER ═══════════════════ */
.sec-hd { margin-bottom: 22px; }
.sec-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -.02em; }
.sec-sub   { font-size: 13px; color: var(--text-secondary); }

/* ═══════════════════ KPI CARDS ═══════════════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 20px 18px; position: relative; overflow: hidden;
  transition: box-shadow .15s, transform .15s; cursor: default;
  box-shadow: var(--shadow-sm);
}
.kpi-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: var(--r) var(--r) 0 0; }
.kpi-card.c-blue::before   { background: var(--blue); }
.kpi-card.c-green::before  { background: var(--green); }
.kpi-card.c-red::before    { background: var(--red); }
.kpi-card.c-amber::before  { background: var(--amber); }
.kpi-card.c-purple::before { background: var(--purple); }
.kpi-card.c-teal::before   { background: var(--teal); }
.kpi-card.c-orange::before { background: var(--orange); }
.kpi-icon  { font-size: 22px; margin-bottom: 10px; display: block; }
.kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
.kpi-value { font-size: 30px; font-weight: 700; color: var(--text-primary); font-family: var(--mono); line-height: 1; }
.kpi-sub   { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
.kpi-trend { font-size: 11px; font-weight: 600; margin-top: 6px; }
.kpi-trend.up   { color: var(--green); }
.kpi-trend.down { color: var(--red); }

/* ═══════════════════ CARD ═══════════════════ */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 22px; margin-bottom: 18px; box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 13px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}

/* ═══════════════════ BADGES ═══════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap;
}
.b-draft       { background: #f1f5f9;          color: #64748b; border: 1px solid #e2e8f0; }
.b-submitted   { background: var(--blue-light); color: var(--blue); border: 1px solid rgba(37,99,235,.2); }
.b-evaluated   { background: var(--green-light);color: var(--green); border: 1px solid rgba(22,163,74,.2); }
.b-revision    { background: var(--orange-light);color: var(--orange); border: 1px solid rgba(234,88,12,.2); }
.b-resubmitted { background: var(--purple-light);color: var(--purple); border: 1px solid rgba(124,58,237,.2); }
.b-blocked     { background: var(--red-light);  color: var(--red); border: 1px solid rgba(220,38,38,.2); }
.b-inprogress  { background: var(--teal-light);  color: var(--teal); border: 1px solid rgba(8,145,178,.2); }
.b-completed   { background: var(--green-light); color: var(--green); border: 1px solid rgba(22,163,74,.2); }
.b-notstarted  { background: #f1f5f9;            color: #64748b; border: 1px solid #e2e8f0; }
.b-selected    { background: var(--amber-light); color: var(--amber); border: 1px solid rgba(217,119,6,.2); }
.b-warn        { background: var(--red-light);   color: var(--red); border: 1px solid rgba(220,38,38,.2); }
.b-admin       { background: #1e2d40;            color: #93c5fd; border: 1px solid rgba(96,165,250,.3); }

/* ═══════════════════ BUTTONS ═══════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--r-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .15s; border: none; font-family: var(--font); white-space: nowrap;
}
.btn-primary   { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
.btn-secondary { background: #fff; color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: #94a3b8; }
.btn-success   { background: var(--green); color: #fff; }
.btn-success:hover { background: #15803d; transform: translateY(-1px); }
.btn-danger    { background: #fff; color: var(--red); border: 1.5px solid #fca5a5; }
.btn-danger:hover { background: var(--red-light); }
.btn-blue      { background: var(--blue); color: #fff; }
.btn-blue:hover { background: var(--accent-hover); }
.btn-orange    { background: var(--orange); color: #fff; }
.btn-orange:hover { filter: brightness(1.05); }
.btn-sm        { padding: 6px 12px; font-size: 12px; }
.btn:disabled  { opacity: .4; cursor: not-allowed; transform: none !important; }

/* ═══════════════════ FORM CONTROLS ═══════════════════ */
.fg     { margin-bottom: 18px; }
.flabel { display: block; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; }
.flabel .req { color: var(--red); margin-left: 2px; }
.fc {
  width: 100%; background: var(--bg-input); border: 1.5px solid var(--border);
  color: var(--text-primary); padding: 11px 14px; border-radius: var(--r-sm);
  font-family: var(--font); font-size: 14px; transition: border-color .15s, box-shadow .15s;
}
.fc::placeholder { color: var(--text-placeholder); }
.fc:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
textarea.fc { resize: vertical; min-height: 96px; }
select.fc option { background: #fff; color: var(--text-primary); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

/* ═══════════════════ FILTER BAR ═══════════════════ */
.fbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 14px 18px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 18px; box-shadow: var(--shadow-sm);
}
.fbar label { font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
.fbar select, .fbar input[type=text] {
  background: var(--bg-input); border: 1.5px solid var(--border);
  color: var(--text-primary); padding: 7px 10px;
  border-radius: var(--r-sm); font-size: 13px; font-family: var(--font);
}
.fbar select:focus, .fbar input:focus { outline: none; border-color: var(--accent); }
.fbar-sep   { height: 20px; width: 1px; background: var(--border); }
.fbar-count { margin-left: auto; font-size: 12px; color: var(--text-muted); font-family: var(--mono); white-space: nowrap; font-weight: 600; }

/* ═══════════════════ TABLE ═══════════════════ */
.tbl-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  background: #f8fafc; color: var(--text-secondary); font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em; padding: 12px 14px;
  text-align: left; white-space: nowrap; border-bottom: 1.5px solid var(--border);
}
td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); color: var(--text-primary); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

/* ═══════════════════ RISK CARD ═══════════════════ */
.risk-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 14px; overflow: hidden; transition: box-shadow .15s;
  box-shadow: var(--shadow-sm);
}
.risk-card:hover { box-shadow: var(--shadow); }
.risk-card.rc-evaluated { border-left: 4px solid var(--green); }
.risk-card.rc-submitted { border-left: 4px solid var(--blue); }
.risk-card.rc-revision  { border-left: 4px solid var(--orange); }
.risk-card.rc-blocked   { border-left: 4px solid var(--red); }
.rch { display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 20px; cursor: pointer; gap: 14px; user-select: none; }
.rch:hover { background: #f8fafc; }
.rch-info { flex: 1; min-width: 0; }
.risk-id-tag { font-size: 11px; font-family: var(--mono); color: var(--text-muted); margin-bottom: 4px; letter-spacing: .04em; }
.risk-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.risk-desc  { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.risk-task  { font-size: 12px; color: var(--blue); margin-top: 6px; padding: 4px 10px; background: var(--blue-light); border-radius: var(--r-sm); display: inline-block; font-weight: 500; }
.risk-owner { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.risk-meta  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.score-pill { font-family: var(--mono); font-size: 11px; background: var(--amber-light); color: var(--amber); padding: 2px 9px; border-radius: 20px; font-weight: 700; border: 1px solid rgba(217,119,6,.2); }
.rcb { border-top: 1px solid var(--border); padding: 22px; display: none; animation: slideDown .2s ease; background: #fafbfc; }
.rcb.open { display: block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.rch-toggle { color: var(--text-muted); font-size: 17px; transition: transform .2s; flex-shrink: 0; margin-top: 2px; }
.risk-card.expanded .rch-toggle { transform: rotate(180deg); }

/* ═══════════════════ ACCORDION ═══════════════════ */
.acc-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
.acc-hd { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; transition: background .15s; }
.acc-hd:hover { background: #f8fafc; }
.acc-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.acc-meta  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.acc-arrow { color: var(--text-muted); font-size: 13px; transition: transform .2s; }
.acc-item.open .acc-arrow { transform: rotate(180deg); }
.acc-body  { border-top: 1px solid var(--border); padding: 18px; display: none; background: #fafbfc; }
.acc-item.open .acc-body { display: block; }

/* ═══════════════════ EVAL CARD ═══════════════════ */
.eval-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
.eval-risk-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; color: var(--text-primary); }
.eval-risk-sub   { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.5; }
.progress-box {
  background: #f8fafc; border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 13px 15px; font-size: 14px; color: var(--text-secondary); margin-bottom: 14px;
  white-space: pre-wrap; line-height: 1.65; max-height: 120px; overflow-y: auto;
}
.score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.score-row input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; }
.score-disp { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--accent); width: 52px; text-align: right; flex-shrink: 0; }

/* ═══════════════════ MISC COMPONENTS ═══════════════════ */

/* 대시보드 집계 */
function buildDashboardData(year, month) {
  const y=Number(year), m=Number(month);
  const selected   = mockRiskMaster.filter(r=>r.year===y&&r.isSelected);
  const allSt      = mockMonthlyStatus.filter(s=>s.year===y&&s.month===m);
  const allEv      = mockEvaluations.filter(e=>e.year===y&&e.month===m);

  const totalRisks  = selected.length;
  const submitted   = allSt.filter(s=>s.submissionStatus!=='Draft').length;
  const evaluated   = allSt.filter(s=>s.submissionStatus==='Evaluated').length;
  const revisionReq = allSt.filter(s=>s.submissionStatus==='RevisionReq').length;
  const pending     = totalRisks - submitted;
  const evalRate    = submitted>0 ? Math.round(evaluated/submitted*100) : 0;
  const submitRate  = totalRisks>0 ? Math.round(submitted/totalRisks*100) : 0;

  const submittedTeams = [...new Set(allSt.filter(s=>s.submissionStatus!=='Draft').map(s=>s.team))];
  const activeTeams    = [...new Set(selected.map(r=>r.team))];
  const missingTeams   = activeTeams.filter(t=>!submittedTeams.includes(t));

  const teamScores = TEAMS.map(team=>{
    const tRisks = selected.filter(r=>r.team===team);
    const tEvals = allEv.filter(e=>e.team===team);
    const tSt    = allSt.filter(s=>s.team===team);
    const avgScore  = tEvals.length ? Math.round(tEvals.reduce((a,e)=>a+e.evaluationScore,0)/tEvals.length) : null;
    const subCnt    = tSt.filter(s=>s.submissionStatus!=='Draft').length;
    const evalCnt   = tSt.filter(s=>s.submissionStatus==='Evaluated').length;
    const subRate   = tRisks.length ? Math.round(subCnt/tRisks.length*100) : 0;
    const evalPct   = subCnt>0 ? Math.round(evalCnt/subCnt*100) : 0;
    return {team, score:avgScore, submitRate:subRate, evalRate:evalPct, riskCount:tRisks.length, subCount:subCnt, evalCount:evalCnt};
  });

  return {totalRisks,submitted,evaluated,revisionReq,pending,evalRate,submitRate,missingTeams,teamScores,allStatuses:allSt,allEvals:allEv,selectedRisks:selected};
}

function getTeamMonthlyScores(team, year) {
  return Array.from({length:12},(_,i)=>{
    const m=i+1;
    const evals=mockEvaluations.filter(e=>e.team===team&&e.year===year&&e.month===m);
    return evals.length ? Math.round(evals.reduce((a,e)=>a+e.evaluationScore,0)/evals.length) : null;
  });
}
function getRiskHistory(riskTitle, team, currentYear) {
  const prev=currentYear-1;
  const pEvals=mockEvaluations.filter(e=>{
    const rm=mockRiskMaster.find(r=>r.riskId===e.riskId);
    return rm&&rm.riskTitle===riskTitle&&e.team===team&&e.year===prev;
  });
  const cEvals=mockEvaluations.filter(e=>{
    const rm=mockRiskMaster.find(r=>r.riskId===e.riskId);
    return rm&&rm.riskTitle===riskTitle&&e.team===team&&e.year===currentYear;
  });
  const p=pEvals.length?Math.round(pEvals.reduce((a,e)=>a+e.evaluationScore,0)/pEvals.length):null;
  const c=cEvals.length?Math.round(cEvals.reduce((a,e)=>a+e.evaluationScore,0)/cEvals.length):null;
  return {prev:p,cur:c,delta:(p!==null&&c!==null)?c-p:null};
}

function handleExcelUpload(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      let added=0;
      rows.forEach(row=>{
        const impact=Number(row.ImpactScore||row['영향도']||3);
        const likelihood=Number(row.LikelihoodScore||row['발생가능성']||3);
        const year=Number(row.Year||row['연도']||AppState.year);
        const team=row.Team||row['팀']||'';
        const title=row.RiskTitle||row['리스크제목']||'';
        const owner=row.Owner||row['담당자']||'';
        if(!title||!team) return;
        const maxNum=mockRiskMaster.filter(r=>r.year===year).length+added+1;
        const riskId=`R-${year}-${String(maxNum).padStart(3,'0')}`;
        mockRiskMaster.push({
          riskId,year,team,riskCategory:row.RiskCategory||row['유형']||'',
          riskTitle:title,riskDescription:row.RiskDescription||row['설명']||'',
          improvementTask:row.ImprovementTask||row['개선과제']||'',
          owner,impactScore:impact,likelihoodScore:likelihood,
          riskFormulaScore:impact*likelihood,isSelected:false,
        });
        added++;
      });
      showToast(`Excel ${added}건 업로드 완료.`,'ok'); renderView('risk-master');
    } catch(err){ showToast('Excel 파싱 오류','err'); console.error(err); }
  };
  reader.readAsBinaryString(file);
  input.value='';
}

function downloadExcelTemplate() {
  const ws=XLSX.utils.aoa_to_sheet([
    ['Year','Team','RiskCategory','RiskTitle','RiskDescription','ImprovementTask','Owner','ImpactScore','LikelihoodScore'],
    [2025,'영업팀','계약','계약서 미검토 리스크','예시 설명','예시 개선과제','홍길동',5,4],
  ]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'RiskMaster');
  XLSX.writeFile(wb,'RiskMaster_Template.xlsx');
}

        </div>
      </div>`).join('')}
    </div>
  `;
}

function autoSelectTopRisks() {
  const n=Number(document.getElementById('topNSel').value);
  const list=mockRiskMaster.filter(r=>r.year===AppState.year);
  list.sort((a,b)=>(b.riskFormulaScore||0)-(a.riskFormulaScore||0));
  list.forEach((r,i)=>{r.isSelected=i<n;});
  showToast(`상위 ${n}건이 점검대상으로 선정되었습니다.`,'ok');
  renderView('risk-select');
}
function clearAllSelected() {
  mockRiskMaster.filter(r=>r.year===AppState.year).forEach(r=>{r.isSelected=false;});
  showToast('점검대상 선정이 초기화되었습니다.','warn');
  renderView('risk-select');
}
</script>


<script>
/* ════════════════════════════════════════════
   TEAM INPUT VIEW
════════════════════════════════════════════ */
async function renderTeamInputView(container) {
  const {year, month, userTeam} = AppState;
  const isAdmin  = AppState.role === 'ComplianceAdmin';
  const viewTeam = isAdmin ? (AppState.viewAsTeam || TEAMS[0]) : userTeam;

  const selectedRisks = mockRiskMaster.filter(r => r.year===year && r.isSelected && r.team===viewTeam);
  const statuses      = await fetchMonthlyStatus(viewTeam, year, month);
  const evals         = mockEvaluations.filter(e => e.team===viewTeam && e.year===year && e.month===month);

  // 제출 현황 요약
  const totalR    = selectedRisks.length;
  const submitted = statuses.filter(s => s.submissionStatus !== 'Draft').length;
  const evaluated = statuses.filter(s => s.submissionStatus === 'Evaluated').length;

  container.innerHTML = `
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">📝 월간 현황 입력</div>
          <div class="sec-sub">${year}년 ${month}월 · ${viewTeam} · 점검대상 ${totalR}건</div>
        </div>
        <div class="flex-row">
          ${isAdmin ? `
          <label style="font-size:13px;color:var(--text-muted);font-weight:600">팀 선택</label>
          <select class="fc" style="width:120px" onchange="AppState.viewAsTeam=this.value;renderView('team-input')">
            ${TEAMS.map(t=>`<option value="${t}" ${t===viewTeam?'selected':''}>${t}</option>`).join('')}
          </select>` : ''}
        </div>
      </div>
    </div>

    <!-- 현황 요약 바 -->
    <div style="display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap">
      ${[
        {label:'점검대상',val:totalR,clr:'var(--accent)'},
        {label:'제출완료',val:submitted,clr:'var(--green)'},
        {label:'미제출',val:totalR-submitted,clr:'var(--red)'},
        {label:'평가완료',val:evaluated,clr:'var(--teal)'},
      ].map(k=>`
      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;flex:1;min-width:100px;box-shadow:var(--shadow-sm)">
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${k.label}</div>
        <div style="font-family:var(--mono);font-size:24px;font-weight:800;color:${k.clr}">${k.val}</div>
      </div>`).join('')}
    </div>

    ${totalR === 0
      ? `<div class="card" style="text-align:center;padding:48px">
          <div style="font-size:36px;margin-bottom:14px">📭</div>
          <div style="color:var(--text-secondary);font-size:15px">배정된 점검대상 리스크가 없습니다.</div>
          <div class="tx-xs tx-muted mt-8">관리자에게 리스크 선정을 요청하세요.</div>
        </div>`
      : selectedRisks.map(risk => {
          const st  = statuses.find(s => s.riskId === risk.riskId);
          const ev  = evals.find(e => e.riskId === risk.riskId);
          const obj = mockObjections.find(o => o.riskId===risk.riskId && o.team===viewTeam && o.year===year && o.month===month);
          return renderRiskInputCard(risk, st, ev, obj, isAdmin, viewTeam);
        }).join('')}
  `;

  // 드래그앤드롭 이벤트
  container.querySelectorAll('.upload-area').forEach(area => {
    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
    area.addEventListener('drop', e => {
      e.preventDefault(); area.classList.remove('drag-over');
      handleFilesDrop(Array.from(e.dataTransfer.files), area.dataset.riskid);
    });
  });
}

function renderRiskInputCard(risk, st, ev, obj, isAdmin, viewTeam) {
  const hist     = getRiskHistory(risk.riskTitle, risk.team, AppState.year);
  const status   = st ? st.submissionStatus : 'Draft';
  const taskSt   = st ? st.taskStatus : 'NotStarted';
  const isSubmitted = status !== 'Draft';
  const isEvaluated = status === 'Evaluated' || status === 'RevisionReq';
  const canEdit  = !isSubmitted || isEvaluated;

  let borderClass = '';
  if (status==='Evaluated')  borderClass='rc-evaluated';
  else if (status==='Submitted'||status==='Resubmitted') borderClass='rc-submitted';
  else if (status==='RevisionReq') borderClass='rc-revision';
  else if (taskSt==='Blocked')     borderClass='rc-blocked';

  const stId  = st ? st.id : '';
  const files = st ? (st.evidenceFiles||[]) : [];
  const prog  = st ? (st.thisMonthProgress||'') : '';
  const evdesc= st ? (st.evidenceDescription||'') : '';

  return `
  <div class="risk-card ${borderClass}" id="rcard-${risk.riskId}">
    <div class="rch" onclick="toggleRiskCard('${risk.riskId}')">
      <div class="rch-info">
        <div class="risk-id-tag">${risk.riskId} · ${risk.riskCategory}</div>
        <div class="risk-title">${risk.riskTitle}</div>
        <div class="risk-desc">${risk.riskDescription}</div>
        <div class="risk-task">📌 ${risk.improvementTask}</div>
        <div class="risk-owner" style="margin-top:5px">
          <span style="color:var(--text-muted);font-size:11px">Owner</span>
          <span style="font-weight:600;margin-left:4px">👤 ${risk.owner||'—'}</span>
        </div>
        <div class="risk-meta">
          <span class="${getStatusBadgeClass(status)}">${getStatusLabel(status)}</span>
          <span class="${getStatusBadgeClass(taskSt)}">${getStatusLabel(taskSt)}</span>
          <span class="score-pill">위험도 ${risk.riskFormulaScore}</span>
          ${hist.delta!==null ? `
          <span class="hist-delta ${hist.delta>0?'hist-up':hist.delta<0?'hist-dn':'hist-eq'}">
            ${hist.delta>0?'▲':hist.delta<0?'▼':'─'}${Math.abs(hist.delta)}
          </span>` : ''}
        </div>
      </div>
      <span class="rch-toggle">▼</span>
    </div>

    <div class="rcb" id="rcb-${risk.riskId}">
      <!-- 히스토리 -->
      ${(hist.prev!==null||hist.cur!==null) ? `
      <div style="background:#f8fafc;border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 16px;margin-bottom:18px">
        <div class="tx-xs tx-muted mb-8" style="font-weight:700;text-transform:uppercase;letter-spacing:.05em">이행 히스토리</div>
        ${hist.prev!==null?`<div class="hist-row"><span class="hist-yr">${AppState.year-1}년</span><span class="hist-sc" style="color:${getScoreColor(hist.prev)}">${hist.prev}점</span><span class="tx-sm tx-muted">전년도 평균</span></div>`:''}
        ${hist.cur!==null?`<div class="hist-row"><span class="hist-yr">${AppState.year}년</span><span class="hist-sc" style="color:${getScoreColor(hist.cur)}">${hist.cur}점</span><span class="tx-sm tx-muted">현재 평균</span></div>`:''}
      </div>` : ''}

      <!-- 입력 폼 -->
      <div class="fg">
        <label class="flabel">이번 달 이행 내용 <span class="req">*</span></label>
        <textarea class="fc" id="prog-${risk.riskId}" rows="4"
          placeholder="이번 달 개선과제 이행 내용을 상세히 입력해 주세요."
          ${!canEdit?'readonly':''}>${prog}</textarea>
      </div>
      <div class="grid-2">
        <div class="fg">
          <label class="flabel">이행 상태</label>
          <select class="fc" id="tstat-${risk.riskId}" ${!canEdit?'disabled':''}>
            ${['NotStarted','InProgress','Completed','Blocked'].map(v=>
              `<option value="${v}" ${taskSt===v?'selected':''}>${getStatusLabel(v)}</option>`
            ).join('')}
          </select>
        </div>
        <div class="fg">
          <label class="flabel">증빙 설명</label>
          <input class="fc" id="evdesc-${risk.riskId}" type="text"
            placeholder="첨부 증빙 파일 설명" value="${evdesc}"/>
        </div>
      </div>

      <!-- 파일 업로드 -->
      <div class="fg">
        <label class="flabel">증빙 파일 첨부</label>
        <div class="upload-area" data-riskid="${risk.riskId}"
          onclick="document.getElementById('file-${risk.riskId}').click()">
          <div class="up-icon">📎</div>
          <p>클릭하거나 파일을 드래그하여 업로드<br>
          <span class="tx-xs tx-muted">교육자료 · 점검보고서 · 계약서 등 (SharePoint 연동 예정)</span></p>
          <input type="file" id="file-${risk.riskId}" multiple style="display:none"
            onchange="handleFileInput(this,'${risk.riskId}')"/>
        </div>
        <div id="filelist-${risk.riskId}">
          ${files.map((f,i)=>renderFileItem(f, risk.riskId, i, true)).join('')}
        </div>
      </div>

      <!-- 평가 결과 표시 -->
      ${ev ? renderEvalResultPanel(ev, obj) : ''}

      <!-- 액션 버튼 -->
      <div class="flex-row mt-16" style="padding-top:14px;border-top:1px solid var(--border)">
        ${canEdit ? `
          <button class="btn btn-secondary" onclick="saveDraft('${risk.riskId}','${stId}','${viewTeam}')">
            💾 임시저장
          </button>
          <button class="btn btn-success" onclick="submitStatus('${risk.riskId}','${stId}','${viewTeam}')">
            ✓ 제출
          </button>
        ` : `
          <span class="badge b-submitted" style="font-size:13px;padding:6px 14px">✓ 제출 완료</span>
          <span class="tx-sm tx-muted">제출일: ${st?st.submittedAt:''} · ${st?st.submittedBy:''}</span>
        `}
        ${ev && ev.evaluationStatus==='RevisionReq' && !obj ? `
          <button class="btn btn-orange" onclick="openRevisionModal('${risk.riskId}','${stId}')">
            ⚑ 이의신청
          </button>` : ''}
      </div>
    </div>
  </div>`;
}

function renderEvalResultPanel(ev, obj) {
  const clr      = getScoreColor(ev.evaluationScore);
  const isRevision = ev.evaluationStatus === 'RevisionReq';
  return `
  <div class="eval-result-panel ${isRevision?'warn':'ok'}">
    <div class="flex-btw mb-8">
      <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)">평가 결과</span>
      <span class="${getStatusBadgeClass(ev.evaluationStatus)}">${getStatusLabel(ev.evaluationStatus)}</span>
    </div>
    <div class="flex-row mb-8">
      <span style="font-family:var(--mono);font-size:26px;font-weight:800;color:${clr}">${ev.evaluationScore}%</span>
      <span class="tx-sm tx-muted">달성율</span>
    </div>
    ${ev.evaluationComment ? `<div style="font-size:14px;color:var(--text-secondary);line-height:1.6">${ev.evaluationComment}</div>` : ''}
    <div class="tx-xs tx-muted mt-8">평가자: ${ev.evaluatedBy} · ${ev.evaluatedAt}</div>
    ${obj ? `<div class="obj-box mt-12">
      <div class="obj-title">⚑ 이의신청 (${obj.objectionStatus==='Pending'?'검토중':'처리완료'})</div>
      <div style="color:var(--text-primary);margin-top:4px">${obj.objectionReason}</div>
    </div>` : ''}
  </div>`;
}

function renderFileItem(fileName, riskId, idx, existing=false) {
  return `
  <div class="upload-file-item" id="fitem-${riskId}-${idx}">
    <span class="fn">📄 ${fileName}</span>
    <span class="fs">${existing?'기존':'신규'}</span>
    <span class="fr" onclick="this.parentElement.remove()" title="삭제">×</span>
  </div>`;
}

function toggleRiskCard(riskId) {
  const card=document.getElementById(`rcard-${riskId}`);
  const body=document.getElementById(`rcb-${riskId}`);
  if(!card||!body) return;
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  card.classList.toggle('expanded',!open);
}

function handleFileInput(input, riskId) {
  handleFilesDrop(Array.from(input.files), riskId);
}

function handleFilesDrop(files, riskId) {
  if(!window._pendingFiles) window._pendingFiles={};
  if(!window._pendingFiles[riskId]) window._pendingFiles[riskId]=[];
  const list=document.getElementById(`filelist-${riskId}`);
  files.forEach(f=>{
    window._pendingFiles[riskId].push(f);
    const sizeStr=f.size<1024*1024?`${Math.round(f.size/1024)}KB`:`${(f.size/1024/1024).toFixed(1)}MB`;
    if(list) list.insertAdjacentHTML('beforeend',`
      <div class="upload-file-item">
        <span class="fn">📎 ${f.name}</span>
        <span class="fs">${sizeStr}</span>
        <span class="fr" onclick="this.parentElement.remove()" title="삭제">×</span>
      </div>`);
  });
  showToast(`${files.length}개 파일 추가. 제출 시 SharePoint 업로드 예정.`,'inf');
}

async function saveDraft(riskId, existingId, team) {
  const prog  =document.getElementById(`prog-${riskId}`)?.value.trim()||'';
  const tstat =document.getElementById(`tstat-${riskId}`)?.value||'NotStarted';
  const evdesc=document.getElementById(`evdesc-${riskId}`)?.value.trim()||'';
  const id    =existingId||genId('MS');
  const existing=mockMonthlyStatus.find(s=>s.id===id);
  const files =existing?(existing.evidenceFiles||[]):[];
  await saveMonthlyStatus({
    id, riskId, team, year:AppState.year, month:AppState.month,
    thisMonthProgress:prog, taskStatus:tstat,
    evidenceDescription:evdesc, evidenceFiles:files,
    submissionStatus:'Draft', submittedAt:null, submittedBy:null,
  });
  showToast('임시저장 완료.','inf');
  renderView('team-input');
}

async function submitStatus(riskId, existingId, team) {
  const prog  =document.getElementById(`prog-${riskId}`)?.value.trim()||'';
  if(!prog){showToast('이행 내용을 입력해 주세요.','err');return;}
  const tstat =document.getElementById(`tstat-${riskId}`)?.value||'NotStarted';
  const evdesc=document.getElementById(`evdesc-${riskId}`)?.value.trim()||'';
  const id    =existingId||genId('MS');
  const existing=mockMonthlyStatus.find(s=>s.id===id);
  const files =existing?[...(existing.evidenceFiles||[])]:[];

  if(window._pendingFiles&&window._pendingFiles[riskId]){
    for(const f of window._pendingFiles[riskId]){
      const res=await uploadToSharePoint(f,`${AppState.year}/${AppState.month}/${riskId}`,riskId);
      if(res.success) files.push(res.fileName);
    }
    delete window._pendingFiles[riskId];
  }
  await saveMonthlyStatus({
    id, riskId, team, year:AppState.year, month:AppState.month,
    thisMonthProgress:prog, taskStatus:tstat,
    evidenceDescription:evdesc, evidenceFiles:files,
    submissionStatus:'Submitted',
    submittedAt:new Date().toISOString().slice(0,10),
    submittedBy:AppState.userName,
  });
  showToast('제출 완료. 컴플라이언스팀에 알림이 발송됩니다.','ok');
  updateEvalBadge();
  renderView('team-input');
}

function openRevisionModal(riskId, statusId) {
  openModal(`
    <div class="modal-title">⚑ 이의신청</div>
    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:18px;line-height:1.6">
      평가 결과에 이의가 있는 경우 사유를 작성하여 제출하세요.<br>
      제출 후 컴플라이언스팀에 자동으로 통보됩니다.
    </div>
    <div class="fg">
      <label class="flabel">이의신청 사유 <span class="req">*</span></label>
      <textarea class="fc" id="objReason" rows="5"
        placeholder="이의신청 사유를 구체적으로 입력해 주세요."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-orange" onclick="submitObjection('${riskId}','${statusId}')">이의신청 제출</button>
    </div>
  `);
}

async function submitObjection(riskId, statusId) {
  const reason=document.getElementById('objReason')?.value.trim();
  if(!reason){showToast('이의신청 사유를 입력해 주세요.','err');return;}
  const team=AppState.role==='ComplianceAdmin'?(AppState.viewAsTeam||AppState.userTeam):AppState.userTeam;
  await saveObjection({
    id:genId('OBJ'), statusId, riskId, team,
    year:AppState.year, month:AppState.month,
    objectionReason:reason, objectionStatus:'Pending',
    submittedAt:new Date().toISOString().slice(0,10),
    submittedBy:AppState.userName,
  });
  closeModal(); showToast('이의신청이 제출되었습니다.','ok');
  renderView('team-input');
}

/* ════════════════════════════════════════════
   MY HISTORY VIEW (팀 담당자)
════════════════════════════════════════════ */
async function renderMyHistoryView(container) {
  const team  = AppState.role==='ComplianceAdmin'?(AppState.viewAsTeam||TEAMS[0]):AppState.userTeam;
  const year  = AppState.year;
  const scores= getTeamMonthlyScores(team, year);
  const selected=mockRiskMaster.filter(r=>r.year===year&&r.isSelected&&r.team===team);
  const evals =mockEvaluations.filter(e=>e.team===team&&e.year===year);
  const avgScore=evals.length?Math.round(evals.reduce((a,e)=>a+e.evaluationScore,0)/evals.length):null;
  const completedRisks=selected.filter(r=>{
    const evList=evals.filter(e=>e.riskId===r.riskId);
    return evList.length>0;
  }).length;

  container.innerHTML=`
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">📈 내 팀 이행현황</div>
          <div class="sec-sub">${year}년 ${team} · 월별 이행 달성율 추이</div>
        </div>
        ${AppState.role==='ComplianceAdmin'?`
        <select class="fc" style="width:120px" onchange="AppState.viewAsTeam=this.value;renderView('my-history')">
          ${TEAMS.map(t=>`<option ${t===team?'selected':''}>${t}</option>`).join('')}
        </select>`:''}
      </div>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
      <div class="kpi-card c-amber">
        <span class="kpi-icon">🎯</span>
        <div class="kpi-label">점검대상</div>
        <div class="kpi-value">${selected.length}</div>
        <div class="kpi-sub">이번 연도 배정</div>
      </div>
      <div class="kpi-card c-blue">
        <span class="kpi-icon">✅</span>
        <div class="kpi-label">평가 완료</div>
        <div class="kpi-value">${completedRisks}</div>
        <div class="kpi-sub">리스크 기준</div>
      </div>
      <div class="kpi-card c-green">
        <span class="kpi-icon">📊</span>
        <div class="kpi-label">연간 평균 달성율</div>
        <div class="kpi-value" style="color:${avgScore!==null?getScoreColor(avgScore):'var(--text-muted)'}">
          ${avgScore!==null?avgScore+'%':'—'}
        </div>
        <div class="kpi-sub">${avgScore!==null?'평균 달성율':'미평가'}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📉 월별 이행 달성율 추이 (${year}년)</div>
      <div style="height:240px"><canvas id="myTeamChart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">📋 리스크별 이행 현황</div>
      ${selected.map(risk=>{
        const rEvals=evals.filter(e=>e.riskId===risk.riskId);
        const avg=rEvals.length?Math.round(rEvals.reduce((a,e)=>a+e.evaluationScore,0)/rEvals.length):null;
        const hist=getRiskHistory(risk.riskTitle, team, year);
        return `
        <div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${risk.riskTitle}</div>
            <div class="tx-xs tx-muted mt-4">${risk.riskCategory} · ${risk.riskId}
              ${risk.owner?`<span style="margin-left:8px">👤 ${risk.owner}</span>`:''}
            </div>
          </div>
          ${avg!==null
            ?`<span style="font-family:var(--mono);font-size:18px;font-weight:800;color:${getScoreColor(avg)}">${avg}%</span>`
            :`<span class="badge b-draft">미평가</span>`}
          ${hist.delta!==null
            ?`<span class="hist-delta ${hist.delta>0?'hist-up':hist.delta<0?'hist-dn':'hist-eq'}">${hist.delta>0?'▲':hist.delta<0?'▼':'─'}${Math.abs(hist.delta)}</span>`
            :''}
        </div>`;
      }).join('')}
    </div>
  `;

  setTimeout(()=>{
    const canvas=document.getElementById('myTeamChart');
    if(!canvas) return;
    new Chart(canvas,{
      type:'line',
      data:{
        labels:Array.from({length:12},(_,i)=>`${i+1}월`),
        datasets:[{
          label:'달성율 (%)', data:scores,
          borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.08)',
          borderWidth:2.5, pointRadius:5,
          pointBackgroundColor:scores.map(s=>s!==null?getScoreColor(s):'transparent'),
          tension:.35, spanGaps:false,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.raw!==null?` ${c.raw}%`:' 미평가'}}},
        scales:{
          y:{min:0,max:100,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'}},
          x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}}
        }
      }
    });
  },100);
}
</script>


<script>
/* ════════════════════════════════════════════
   ADMIN EVALUATION VIEW
════════════════════════════════════════════ */
async function renderAdminEvaluationView(container) {
  const {year, month} = AppState;
  const fTeam   = AppState.eFilterTeam;
  const fStatus = AppState.eFilterStatus;

  let statuses = await fetchMonthlyStatus('', year, month);
  statuses = statuses.filter(s => s.submissionStatus !== 'Draft');
  if (fTeam)           statuses = statuses.filter(s => s.team === fTeam);
  if (fStatus !== 'all') statuses = statuses.filter(s => s.submissionStatus === fStatus);

  const pendingCount = mockMonthlyStatus.filter(s =>
    s.year===year && s.month===month && s.submissionStatus==='Submitted'
  ).length;
  const allSubmitted  = mockMonthlyStatus.filter(s=>s.year===year&&s.month===month&&s.submissionStatus!=='Draft').length;
  const allEvaluated  = mockMonthlyStatus.filter(s=>s.year===year&&s.month===month&&s.submissionStatus==='Evaluated').length;
  const allRevision   = mockMonthlyStatus.filter(s=>s.year===year&&s.month===month&&s.submissionStatus==='RevisionReq').length;

  container.innerHTML = `
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">⚖️ 이행 달성율 평가</div>
          <div class="sec-sub">${year}년 ${month}월 · 팀 제출 현황 검토 및 이행 달성율 평가 (0~100%)</div>
        </div>
      </div>
    </div>

    <!-- 평가 현황 요약 -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:22px">
      ${[
        {label:'전체 제출',val:allSubmitted,clr:'var(--blue)',icon:'📬'},
        {label:'평가대기',val:pendingCount,clr:'var(--orange)',icon:'⏳'},
        {label:'평가완료',val:allEvaluated,clr:'var(--green)',icon:'✅'},
        {label:'수정요청',val:allRevision,clr:'var(--red)',icon:'↩'},
      ].map(k=>`
      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)">
        <div style="font-size:18px;margin-bottom:6px">${k.icon}</div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${k.label}</div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:800;color:${k.clr}">${k.val}</div>
      </div>`).join('')}
    </div>

    <!-- 필터 -->
    <div class="fbar">
      <label>팀</label>
      <select onchange="AppState.eFilterTeam=this.value;renderView('admin-eval')">
        <option value="">전체</option>
        ${TEAMS.map(t=>`<option value="${t}" ${t===fTeam?'selected':''}>${t}</option>`).join('')}
      </select>
      <label>상태</label>
      <select onchange="AppState.eFilterStatus=this.value;renderView('admin-eval')">
        <option value="all">전체 제출건</option>
        <option value="Submitted"   ${fStatus==='Submitted'  ?'selected':''}>제출완료 (평가대기)</option>
        <option value="Evaluated"   ${fStatus==='Evaluated'  ?'selected':''}>평가완료</option>
        <option value="RevisionReq" ${fStatus==='RevisionReq'?'selected':''}>수정요청</option>
        <option value="Resubmitted" ${fStatus==='Resubmitted'?'selected':''}>재제출</option>
      </select>
      <span class="fbar-count">${statuses.length}건</span>
    </div>

    ${statuses.length===0
      ? `<div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">
           해당 조건의 제출 건이 없습니다.
         </div>`
      : statuses.map(st => renderEvalCard(st, year, month)).join('')}
  `;
}

function renderEvalCard(st, year, month) {
  const risk = mockRiskMaster.find(r => r.riskId === st.riskId);
  const ev   = mockEvaluations.find(e => e.riskId===st.riskId && e.team===st.team && e.year===year && e.month===month);
  const obj  = mockObjections.find(o => o.riskId===st.riskId && o.team===st.team && o.year===year && o.month===month);

  const prevScore  = ev ? ev.evaluationScore   : 70;
  const prevCmt    = ev ? ev.evaluationComment  : '';
  const prevStatus = ev ? ev.evaluationStatus   : 'Evaluated';
  const evId       = ev ? ev.id : genId('EV');

  return `
  <div class="eval-card" id="evcard-${st.id}">
    <!-- 헤더 -->
    <div class="flex-btw" style="margin-bottom:12px">
      <div>
        <div class="eval-risk-title">
          ${risk ? risk.riskTitle : st.riskId}
          <span class="chip" style="margin-left:8px">${risk?risk.riskCategory:''}</span>
        </div>
        <div class="eval-risk-sub">
          <span class="chip">${st.team}</span>
          ${risk && risk.owner ? `<span style="margin-left:8px;font-size:13px">👤 Owner: <strong>${risk.owner}</strong></span>` : ''}
          <span style="margin-left:8px;font-size:13px;color:var(--text-muted)">${year}년 ${month}월 · 제출일: ${st.submittedAt||'—'} · ${st.submittedBy||'—'}</span>
        </div>
      </div>
      <span class="${getStatusBadgeClass(st.submissionStatus)}" style="flex-shrink:0">${getStatusLabel(st.submissionStatus)}</span>
    </div>

    <!-- 이행 내용 -->
    <div style="margin-bottom:6px">
      <div class="tx-xs tx-muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">이행 내용</div>
      <div class="progress-box">${st.thisMonthProgress || '(미입력)'}</div>
    </div>

    <!-- 이행 상태 + 증빙 -->
    <div class="flex-row" style="margin-bottom:14px">
      <span class="${getStatusBadgeClass(st.taskStatus)}">${getStatusLabel(st.taskStatus)}</span>
      ${st.evidenceFiles && st.evidenceFiles.length
        ? st.evidenceFiles.map(f=>`<span class="chip" style="font-size:12px">📎 ${f}</span>`).join('')
        : '<span class="tx-xs tx-muted">증빙 없음</span>'}
    </div>

    <!-- 이의신청 표시 -->
    ${obj ? `
    <div class="obj-box" style="margin-bottom:14px">
      <div class="obj-title">⚑ 이의신청 접수 (${obj.submittedAt}) —
        ${obj.objectionStatus==='Pending'
          ?`<span style="color:var(--orange)">검토중</span>`
          :`<span style="color:var(--green)">처리완료</span>`}
      </div>
      <div style="margin-top:6px;color:var(--text-primary)">${obj.objectionReason}</div>
    </div>` : ''}

    <!-- 평가 입력 패널 -->
    <div style="background:#f8fafc;border:1.5px solid var(--border);border-radius:var(--r);padding:18px">
      <div class="tx-xs tx-muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">달성율 입력</div>
      <div class="score-row">
        <span style="font-size:14px;color:var(--text-secondary);font-weight:600;white-space:nowrap">이행 달성율 (%)</span>
        <input type="range" id="srange-${st.id}" min="0" max="100" value="${prevScore}"
          oninput="document.getElementById('sdisp-${st.id}').textContent=this.value+'%';
                   document.getElementById('sdisp-${st.id}').style.color=getScoreColor(Number(this.value))"/>
        <div class="score-disp" id="sdisp-${st.id}" style="color:${getScoreColor(prevScore)}">${prevScore}%</div>
      </div>
      <div class="fg mt-8">
        <label class="flabel">평가 코멘트</label>
        <textarea class="fc" id="ecmt-${st.id}" rows="3"
          placeholder="개선 권고사항, 보완 지시, 우수 사례 등">${prevCmt}</textarea>
      </div>
      <div class="fg">
        <label class="flabel">평가 결과</label>
        <div class="flex-row">
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;font-weight:500">
            <input type="radio" name="estatus-${st.id}" value="Evaluated"
              ${prevStatus==='Evaluated'?'checked':''}> 평가완료
          </label>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;font-weight:500">
            <input type="radio" name="estatus-${st.id}" value="RevisionReq"
              ${prevStatus==='RevisionReq'?'checked':''}> 수정요청
          </label>
        </div>
      </div>
      <div class="flex-row" style="margin-top:4px">
        <button class="btn btn-primary" onclick="submitEvaluation('${st.id}','${st.riskId}','${st.team}','${evId}')">
          ✓ 평가 저장
        </button>
        ${obj && obj.objectionStatus==='Pending'
          ? `<button class="btn btn-secondary" onclick="resolveObjection('${obj.id}')">이의신청 처리완료</button>`
          : ''}
        ${ev ? `<span class="tx-sm tx-muted">마지막 평가: ${ev.evaluatedAt}</span>` : ''}
      </div>
    </div>
  </div>`;
}

async function submitEvaluation(statusId, riskId, team, evId) {
  const score  = Number(document.getElementById(`srange-${statusId}`)?.value||0);
  const cmt    = document.getElementById(`ecmt-${statusId}`)?.value.trim()||'';
  const radio  = document.querySelector(`input[name="estatus-${statusId}"]:checked`);
  const estatus= radio ? radio.value : 'Evaluated';
  await saveEvaluation({
    id:evId, riskId, team, year:AppState.year, month:AppState.month,
    evaluationScore:score, evaluationComment:cmt, evaluationStatus:estatus,
    evaluatedAt:new Date().toISOString().slice(0,10), evaluatedBy:AppState.userName,
  });
  showToast(`달성율 저장 완료 (${score}% · ${estatus==='Evaluated'?'평가완료':'수정요청'})`,'ok');
  updateEvalBadge();
  renderView('admin-eval');
}

async function resolveObjection(objId) {
  const obj=mockObjections.find(o=>o.id===objId);
  if(!obj) return;
  obj.objectionStatus='Resolved';
  showToast('이의신청을 처리완료로 변경했습니다.','ok');
  renderView('admin-eval');
}
</script>


<script>

  container.innerHTML = `
    <div class="sec-hd">
      <div class="flex-btw">
        <div>
          <div class="sec-title">📊 전사 대시보드</div>
          <div class="sec-sub">${year}년 ${month}월 기준 · 전사 컴플라이언스 이행 현황 종합</div>

    <!-- KPI 카드 -->

        <div class="kpi-sub">점검대상 리스크</div>

      <div class="kpi-card c-teal">
        <span class="kpi-icon">📬</span>
        <div class="kpi-label">제출완료</div>
        <div class="kpi-value">${dash.submitted}</div>
        <div class="kpi-sub">이행률 ${dash.submitRate}%</div>
      </div>

        <div class="kpi-label">미제출</div>

        <div class="kpi-sub">미입력 팀 ${dash.missingTeams.length}개</div>
      </div>
      <div class="kpi-card c-green">
        <span class="kpi-icon">✅</span>
        <div class="kpi-label">평가완료</div>
        <div class="kpi-value">${dash.evaluated}</div>
        <div class="kpi-sub">평가율 ${dash.evalRate}%</div>
      </div>
      <div class="kpi-card c-orange">
        <span class="kpi-icon">↩</span>
        <div class="kpi-label">수정요청</div>
        <div class="kpi-value">${dash.revisionReq}</div>
        <div class="kpi-sub">재제출 대기</div>
      </div>
    </div>

    <!-- 전체 이행률 진행바 -->
    <div class="card" style="padding:18px 22px">
      <div class="flex-btw mb-8">
        <span style="font-size:14px;font-weight:700;color:var(--text-secondary)">전사 이행률</span>
        <span style="font-family:var(--mono);font-size:16px;font-weight:800;color:${getScoreColor(dash.submitRate)}">${dash.submitRate}%</span>
      </div>
      <div class="pbar-wrap" style="height:14px">
        <div class="pbar-fill" style="width:${dash.submitRate}%;background:${getScoreColor(dash.submitRate)}"></div>
      </div>
      <div class="flex-row mt-8" style="justify-content:space-between">
        <span class="tx-xs tx-muted">제출 ${dash.submitted} / ${dash.totalRisks}건</span>
        <span class="tx-xs tx-muted">평가 ${dash.evaluated} / ${dash.submitted}건 (${dash.evalRate}%)</span>
      </div>
    </div>

    <!-- 미입력 팀 경고 -->
    ${dash.missingTeams.length>0 ? `
    <div class="warn-box">
      <div class="warn-icon">⚠️</div>
      <div>
        <div class="warn-title">${month}월 미제출 팀 감지 (${dash.missingTeams.length}개 팀)</div>
        <div class="warn-sub">아래 팀의 월간 현황이 제출되지 않았습니다. 독촉 알림 발송을 권장합니다.</div>
        <div class="warn-tags">${dash.missingTeams.map(t=>`<span class="warn-tag">⚠ ${t}</span>`).join('')}</div>
      </div>
    </div>` : `
    <div class="ok-box">
      <span style="font-size:18px">✅</span>
      <span style="font-size:14px;font-weight:700;color:var(--green)">모든 팀이 ${month}월 현황을 제출했습니다.</span>
    </div>`}

    <!-- 팀별 현황 + 히트맵 -->
    <div class="grid-2" style="margin-bottom:18px">
      <div class="card" style="margin-bottom:0">
        <div class="card-title">👥 팀별 이행 현황</div>
        ${dash.teamScores.map(ts => `
        <div class="team-row">
          <span class="t-name">${ts.team}</span>
          <div style="flex:1">
            <div class="pbar-wrap">
              <div class="pbar-fill" style="width:${ts.submitRate}%;background:${ts.submitRate>=80?'var(--green)':ts.submitRate>=50?'var(--amber)':'var(--red)'}"></div>
            </div>
            <div class="flex-row mt-4">
              <span class="tx-xs tx-muted">제출 ${ts.subCount}/${ts.riskCount}</span>
              <span class="tx-xs tx-muted" style="margin-left:auto">평가율 ${ts.evalRate}%</span>
            </div>
          </div>
          <span class="t-pct" style="color:${ts.submitRate>=80?'var(--green)':ts.submitRate>=50?'var(--amber)':'var(--red)'}">${ts.submitRate}%</span>
          ${ts.score!==null
            ?`<span style="font-family:var(--mono);font-size:14px;font-weight:800;color:${getScoreColor(ts.score)};width:52px;text-align:right;flex-shrink:0">${ts.score}%</span>`
            :`<span class="tx-xs tx-muted" style="width:52px;text-align:right;flex-shrink:0">미평가</span>`}
        </div>`).join('')}
        <div style="margin-top:16px;height:200px">
          <canvas id="teamBarChart"></canvas>
        </div>
      </div>

      <div class="card" style="margin-bottom:0">
        <div class="card-title">🔥 리스크 Heatmap (Impact × Likelihood)</div>
        ${renderHeatmap(year)}
      </div>
    </div>

    <!-- 팀별 상세 아코디언 -->
    <div class="card">
      <div class="card-title">📂 팀별 리스크 상세 현황</div>
      <div id="teamAccordions">
        ${dash.teamScores.map(ts=>renderTeamAccordion(ts, dash, year, month)).join('')}
      </div>
    </div>
  `;

  setTimeout(()=>{
    renderTeamBarChart(dash.teamScores);
    document.querySelectorAll('.acc-hd').forEach(hd=>{
      hd.addEventListener('click',()=>{
        const item=hd.parentElement;
        const wasOpen=item.classList.contains('open');
        document.querySelectorAll('.acc-item').forEach(i=>i.classList.remove('open'));
        if(!wasOpen){
          item.classList.add('open');
          setTimeout(()=>renderTeamMonthChart(item.dataset.team, year), 50);
        }
      });
    });
  },100);
}

function renderTeamAccordion(ts, dash, year, month) {
  const selRisks=mockRiskMaster.filter(r=>r.year===year&&r.isSelected&&r.team===ts.team);
  const tSt=dash.allStatuses.filter(s=>s.team===ts.team);
  const subCnt=tSt.filter(s=>s.submissionStatus!=='Draft').length;

  return `
  <div class="acc-item" data-team="${ts.team}">
    <div class="acc-hd">
      <div class="acc-title">${ts.team}</div>
      <div class="acc-meta">
        <span class="chip">점검 ${selRisks.length}건</span>
        <span class="chip" style="${subCnt===selRisks.length&&selRisks.length>0?'background:var(--green-light);color:var(--green);border-color:rgba(22,163,74,.3)':''}">
          제출 ${subCnt}/${selRisks.length}
        </span>
        ${ts.score!==null
          ?`<span style="font-family:var(--mono);font-size:15px;font-weight:800;color:${getScoreColor(ts.score)}">${ts.score}%</span>`
          :`<span class="tx-sm tx-muted">미평가</span>`}
        <span class="acc-arrow">▼</span>
      </div>
    </div>
    <div class="acc-body">
      <div style="height:180px;margin-bottom:16px">
        <canvas id="mchart-${ts.team.replace(/\s/g,'')}"></canvas>
      </div>
      ${selRisks.map(risk=>{
        const st=tSt.find(s=>s.riskId===risk.riskId);
        const ev=mockEvaluations.find(e=>e.riskId===risk.riskId&&e.year===year&&e.month===month&&e.team===ts.team);
        return `
        <div style="background:#fafbfc;border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 15px;margin-bottom:8px">
          <div class="flex-row" style="flex-wrap:wrap;gap:8px">
            <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${risk.riskId}</span>
            <span style="font-size:14px;font-weight:600">${risk.riskTitle}</span>
            ${risk.owner?`<span class="tx-xs tx-muted">👤 ${risk.owner}</span>`:''}
            <span class="${getStatusBadgeClass(st?st.submissionStatus:'Draft')}">${getStatusLabel(st?st.submissionStatus:'미입력')}</span>
            ${ev?`<span style="margin-left:auto;font-family:var(--mono);font-weight:800;font-size:14px;color:${getScoreColor(ev.evaluationScore)}">${ev.evaluationScore}%</span>`:''}
          </div>
          ${st&&st.thisMonthProgress?`<div class="tx-sm tx-muted mt-4">${st.thisMonthProgress.substring(0,80)}${st.thisMonthProgress.length>80?'…':''}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ── 팀 이행현황 (관리자용 전체 뷰) ── */
async function renderTeamOverviewView(container) {
  const year = AppState.year;
  const selected = mockRiskMaster.filter(r=>r.year===year&&r.isSelected);

  container.innerHTML = `
    <div class="sec-hd">
      <div class="sec-title">📈 팀 이행현황</div>
      <div class="sec-sub">${year}년 · 팀별 월간 이행 달성율 추이 및 리스크 현황</div>
    </div>
    ${TEAMS.map(team=>{
      const tRisks=selected.filter(r=>r.team===team);
      const tEvals=mockEvaluations.filter(e=>e.team===team&&e.year===year);
      const avg=tEvals.length?Math.round(tEvals.reduce((a,e)=>a+e.evaluationScore,0)/tEvals.length):null;
      const safeTeam=team.replace(/\s/g,'');
      return `
      <div class="card">
        <div class="flex-btw" style="margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-size:16px;font-weight:700">${team}</span>
            <span class="chip" style="margin-left:10px">점검대상 ${tRisks.length}건</span>
          </div>
          ${avg!==null
            ?`<span style="font-family:var(--mono);font-size:20px;font-weight:800;color:${getScoreColor(avg)}">${avg}%</span>`
            :`<span class="badge b-draft">미평가</span>`}
        </div>
        <div style="height:180px;margin-bottom:16px"><canvas id="ov-${safeTeam}"></canvas></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${tRisks.map(r=>{
            const rEvals=tEvals.filter(e=>e.riskId===r.riskId);
            const rAvg=rEvals.length?Math.round(rEvals.reduce((a,e)=>a+e.evaluationScore,0)/rEvals.length):null;
            return `
            <div style="background:#f8fafc;border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;min-width:160px;flex:1">
              <div style="font-size:12px;font-weight:600;margin-bottom:2px">${r.riskTitle.substring(0,22)}${r.riskTitle.length>22?'…':''}</div>
              <div class="tx-xs tx-muted">${r.riskCategory}${r.owner?` · 👤 ${r.owner}`:''}</div>
              <div style="margin-top:6px;font-family:var(--mono);font-size:15px;font-weight:800;color:${rAvg!==null?getScoreColor(rAvg):'var(--text-muted)'}">
                ${rAvg!==null?`${rAvg}%`:'미평가'}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  `;

  setTimeout(()=>{
    TEAMS.forEach(team=>{
      const safeTeam=team.replace(/\s/g,'');
      const canvas=document.getElementById(`ov-${safeTeam}`);
      if(!canvas) return;
      const scores=getTeamMonthlyScores(team, year);
      new Chart(canvas,{
        type:'line',
        data:{
          labels:Array.from({length:12},(_,i)=>`${i+1}월`),
          datasets:[{
            label:'달성율 (%)', data:scores,
            borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.07)',
            borderWidth:2, pointRadius:4,
            pointBackgroundColor:scores.map(s=>s!==null?getScoreColor(s):'transparent'),
            tension:.35, spanGaps:false,
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.raw!==null?` ${c.raw}%`:' 미평가'}}},
          scales:{
            y:{min:0,max:100,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v+'%'}},
            x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:10}}}
          }
        }
      });
    });
  },100);
}

/* ── Heatmap ── */
function renderHeatmap(year) {
  const risks=mockRiskMaster.filter(r=>r.year===year&&r.isSelected);
  const cells={};
  for(let l=1;l<=5;l++) for(let i=1;i<=5;i++) cells[`${l}_${i}`]=[];
  risks.forEach(r=>{
    const key=`${r.likelihoodScore}_${r.impactScore}`;
    if(cells[key]) cells[key].push(r.riskTitle);
  });

  const getHmStyle=(impact,likelihood)=>{
    const s=impact*likelihood;
    if(s>=15) return {bg:'rgba(220,38,38,.15)',bdr:'rgba(220,38,38,.3)',clr:'#dc2626'};
    if(s>=9)  return {bg:'rgba(234,88,12,.12)',bdr:'rgba(234,88,12,.3)',clr:'#ea580c'};
    if(s>=5)  return {bg:'rgba(217,119,6,.1)',bdr:'rgba(217,119,6,.3)',clr:'#d97706'};
    return           {bg:'rgba(22,163,74,.1)', bdr:'rgba(22,163,74,.3)', clr:'#16a34a'};
  };

  let html='<div class="hm-wrap"><div class="hm-grid">';
  html+='<div class="hm-axis"></div>';
  for(let i=1;i<=5;i++) html+=`<div class="hm-axis" style="font-size:13px">${i}</div>`;
  for(let l=5;l>=1;l--){
    html+=`<div class="hm-axis">${l}</div>`;
    for(let i=1;i<=5;i++){
      const key=`${l}_${i}`;
      const count=cells[key].length;
      const {bg,bdr,clr}=getHmStyle(i,l);
      const title=cells[key].join('\n');
      html+=`
      <div class="hm-cell" style="background:${bg};border-color:${count>0?bdr:'var(--border)'}" title="${title}">
        <span class="hm-cnt" style="color:${count>0?clr:'var(--text-muted)'}">${count>0?count:'·'}</span>
        ${count>0?`<span class="hm-lbl" style="color:${clr}">${count}건</span>`:''}
      </div>`;
    }
  }
  html+='</div>';
  html+=`
    <div style="display:flex;justify-content:space-between;margin-top:8px;padding:0 36px">
      <span class="tx-xs tx-muted">← 영향도 낮음</span>
      <span style="font-size:12px;color:var(--text-secondary);font-weight:700">영향도 (Impact)</span>
      <span class="tx-xs tx-muted">높음 →</span>
    </div>
    <div style="text-align:center;margin-top:4px">
      <span style="font-size:12px;color:var(--text-secondary);font-weight:700">발생가능성 (Likelihood) ↑</span>
    </div>
    <div class="flex-row mt-10" style="justify-content:center;gap:14px;flex-wrap:wrap">
      ${[
        {bg:'rgba(22,163,74,.15)',bdr:'rgba(22,163,74,.4)',label:'저위험 (1~4)'},
        {bg:'rgba(217,119,6,.12)',bdr:'rgba(217,119,6,.4)',label:'주의 (5~8)'},
        {bg:'rgba(234,88,12,.15)',bdr:'rgba(234,88,12,.4)',label:'고위험 (9~14)'},
        {bg:'rgba(220,38,38,.18)',bdr:'rgba(220,38,38,.4)',label:'최고위험 (15~25)'},
      ].map(l=>`
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)">
        <span style="width:13px;height:13px;background:${l.bg};border:1.5px solid ${l.bdr};border-radius:3px;display:inline-block"></span>
        ${l.label}
      </span>`).join('')}
    </div>
  </div>`;
  return html;
}

/* ── 팀별 가로 막대 차트 ── */
function renderTeamBarChart(teamScores) {
  const canvas=document.getElementById('teamBarChart');
  if(!canvas) return;
  if(window._barChart){window._barChart.destroy();delete window._barChart;}
  const labels=teamScores.map(t=>t.team);
  const data=teamScores.map(t=>t.score||0);
  const colors=data.map(s=>getScoreColor(s));
  window._barChart=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'평균 달성율', data,
        backgroundColor:colors.map(c=>c+'33'),
        borderColor:colors, borderWidth:2, borderRadius:5,
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw}%`}}},
      scales:{
        x:{min:0,max:100,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'}},
        y:{grid:{display:false},ticks:{color:'#1a2332',font:{size:12,weight:'600'}}}
      }
    }
  });
}

/* ── 팀 월별 라인 차트 (아코디언) ── */
function renderTeamMonthChart(team, year) {
  const safe=team.replace(/\s/g,'');
  const canvas=document.getElementById(`mchart-${safe}`);
  if(!canvas) return;
  if(window[`_mc_${safe}`]){window[`_mc_${safe}`].destroy();delete window[`_mc_${safe}`];}
  const scores=getTeamMonthlyScores(team, year);
  window[`_mc_${safe}`]=new Chart(canvas,{
    type:'line',
    data:{
      labels:Array.from({length:12},(_,i)=>`${i+1}월`),
      datasets:[{
        label:'달성율 (%)', data:scores,
        borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.07)',
        borderWidth:2.5, pointRadius:5,
        pointBackgroundColor:scores.map(s=>s!==null?getScoreColor(s):'transparent'),
        tension:.35, spanGaps:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.raw!==null?` ${c.raw}%`:' 미평가'}}},
      scales:{
        y:{min:0,max:100,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v+'%'}},
        x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:10}}}
      }
    }
  });
}
